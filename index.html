<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinny</title>
  <link rel="shortcut icon" type="image/png" href="Kinny icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      height: 100vh;            /* fallback for old browsers */
      height: 100dvh;          /* dynamic viewport height — accounts for mobile browser toolbars so the input bar stays visible */
      display: flex;
      flex-direction: column;
    }
    #vt-status-bar {
      flex-shrink: 0;
      background: #1a1a2e;
      color: #aaa;
      font-size: 12px;
      font-family: monospace;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #333;
      z-index: 99999;
    }
    #vt-status-bar .vt-label { color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    #vt-status-bar .vt-dot   { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
    #vt-status-bar .vt-dot.ready   { background: #22c55e; }
    #vt-status-bar .vt-dot.success { background: #3b82f6; }
    #vt-status-bar .vt-dot.error   { background: #ef4444; }
    #vt-status-bar #vt-msg  { color: #e2e8f0; flex: 1; }
    #vt-status-bar #vt-time { color: #555; font-size: 11px; }
    #bp-embedded { flex: 1; width: 100%; min-height: 0; }

    /* ── Status bar visibility ───────────────────────────────
       Hidden by default for end users.
       To show it: add ?debug to the URL, e.g.
         http://localhost:8080/botpress-video-tracking.html?debug
       To hide it again: remove ?debug from the URL.
       You can also temporarily force-show by changing the line
       below from "display: none" to "display: flex".            */
    #vt-status-bar { display: none !important; }

    /* ── Image enlarge button (one per image, always visible) ── */
    .vt-img-btn {
      position: fixed;
      z-index: 2147483646;
      width: 32px;
      height: 32px;
      background: rgba(0, 0, 0, 0.55);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      pointer-events: auto;
    }
    .vt-img-btn:hover { background: rgba(0, 0, 0, 0.8); }

    /* iOS landscape-fullscreen button on videos + rotated overlay */
    .vt-vid-btn {
      position: fixed; z-index: 2147483646; width: 36px; height: 36px;
      background: rgba(0, 0, 0, 0.62); border: none; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 19px; line-height: 1; pointer-events: auto;
      -webkit-tap-highlight-color: transparent;
    }
    .vt-vid-btn:hover { background: rgba(0, 0, 0, 0.82); }
    #vt-vfs { position: fixed; inset: 0; z-index: 2147483647; background: #000; overflow: hidden; }
    #vt-vfs .vt-vfs-x {
      position: absolute; top: calc(env(safe-area-inset-top, 0px) + 10px); right: 14px; z-index: 3;
      background: rgba(0,0,0,0.5); color: #fff; border: none; border-radius: 8px;
      width: 42px; height: 42px; font-size: 20px; line-height: 1; cursor: pointer;
    }

    /* ── Pain-scale quick-select widget (inline in conversation) ── */
    #vt-painscale {
      box-sizing: border-box;
      align-self: stretch;
      padding: 4px 14px 16px 14px;
    }
    #vt-painscale .vt-ps-inner {
      display: flex;
      gap: 4px;
      width: 100%;
      max-width: 560px;
    }
    #vt-painscale .vt-ps-cell {
      flex: 1 1 0;
      min-width: 0;
      min-height: 42px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: sans-serif;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #vt-painscale .vt-ps-cell:hover  { transform: translateY(-1px); }
    #vt-painscale .vt-ps-cell:active { transform: translateY(0); }
    #vt-painscale .vt-ps-cell.sel    { outline: 3px solid #1a1a2e; outline-offset: -1px; transform: translateY(-2px); }

    /* ── Lightbox ───────────────────────────────────────────── */
    #vt-lightbox {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #vt-lightbox.open { display: flex; }
    #vt-lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 12px 60px rgba(0,0,0,0.7);
      cursor: default;
    }
    #vt-lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 32px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.7;
      background: none;
      border: none;
      font-family: sans-serif;
    }
    #vt-lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <div id="vt-status-bar">
    <div class="vt-dot" id="vt-dot"></div>
    <span class="vt-label">VideoTrack</span>
    <span id="vt-msg">Initialising...</span>
    <span id="vt-time"></span>
  </div>

  <div id="bp-embedded"></div>

  <!-- Lightbox -->
  <div id="vt-lightbox">
    <button id="vt-lightbox-close" aria-label="Close">&times;</button>
    <img id="vt-lightbox-img" src="" alt="Enlarged image">
  </div>

  <!-- ── 24-hour session reset ────────────────────────────────
       Must run BEFORE Botpress scripts load so the webchat
       starts with clean storage when the window has expired.   -->
  <script>
  (function () {
    var RESET_KEY   = 'vt_session_started';
    var WINDOW_MS   = 7 * 24 * 60 * 60 * 1000; // ← 7 days (production)
    var now         = Date.now();
    var lastStart   = parseInt(localStorage.getItem(RESET_KEY) || '0', 10);
    var needsReset  = !lastStart || (now - lastStart) > WINDOW_MS;

    if (needsReset) {
      // Clear every Botpress key in localStorage
      var toRemove = [];
      for (var i = 0; i < localStorage.length; i++) {
        var k = localStorage.key(i);
        if (k && (
          k.startsWith('bp-webchat-') ||  // Botpress v3 webchat (history, -client, -sound) ← the real keys
          k.startsWith('bp/')        ||
          k.startsWith('botpress')   ||
          k.indexOf('8549d670') !== -1   // bot ID safety-net
        )) {
          toRemove.push(k);
        }
      }
      toRemove.forEach(function (k) { localStorage.removeItem(k); });
      localStorage.setItem(RESET_KEY, String(now));
      console.log('[VideoTrack] New 24h session started —', new Date(now).toLocaleString());
    } else {
      var hoursLeft = ((WINDOW_MS - (now - lastStart)) / 3600000).toFixed(1);
      console.log('[VideoTrack] Session active — resets in ' + hoursLeft + 'h');
    }
  })();
  </script>

  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/05/01/17/20260501175250-U19M6YD6.js" defer></script>

  <script>
  (function () {

    // ==========================================================
    // CONFIG
    // ==========================================================
    const PAT    = 'bp_pat_zyZ92KuZ5vS8UgFoUAL6waE81bqbFJPEagbm';
    const BOT_ID = '8549d670-8fda-4a37-b890-cd839462de23';
    const TABLE  = 'UserInputTable';
    // ==========================================================

    let currentUserId       = 'unknown';
    let currentSession      = '';
    let currentPlacement    = 'General';
    let currentReviewSession = '';
    let currentVideoClipNo  = '';   // which clip (1-4) the current video step is — from __currentvideoclipno:N__

    // ── ConversationId tracking (client-side, always matches active conversation) ──
    var _currentConvId = '';
    var _convIdLogged  = false;

    // ── Status bar ────────────────────────────────────────────
    const dot = document.getElementById('vt-dot');
    const msg = document.getElementById('vt-msg');
    const tim = document.getElementById('vt-time');

    function setStatus(state, text) {
      dot.className   = 'vt-dot ' + state;
      msg.textContent = text;
      tim.textContent = hkNow();
      console.log('[VideoTrack]', text);
    }

    // ── HK Timestamp (UTC+8) ─────────────────────────────────
    // Shifts from UTC directly using getUTC* methods so the result
    // is always HKT regardless of the user's device timezone.
    function hkNow() {
      const hk = new Date(Date.now() + 8 * 60 * 60 * 1000);
      const p  = x => String(x).padStart(2, '0');
      return p(hk.getUTCDate())+'/'+p(hk.getUTCMonth()+1)+'/'+hk.getUTCFullYear()
            +' '+p(hk.getUTCHours())+':'+p(hk.getUTCMinutes())+':'+p(hk.getUTCSeconds());
    }

    // ── Log row to UserInputTable ────────────────────────────
    function logRow(variableName, variableValue) {
      // "Review Session" placement includes the review session number in the name
      var fullName;
      if (currentPlacement === 'Review Session') {
        fullName = variableName + ' - Review Session (' + currentReviewSession + ')';
      } else {
        fullName = variableName + ' - ' + currentPlacement;
      }
      // distinguish each of the 4 video clips within a session/placement (Video1-4)
      if (currentVideoClipNo) fullName += ' - Clip (' + currentVideoClipNo + ')';
      setStatus('', 'Logging: ' + fullName + '...');
      fetch('https://api.botpress.cloud/v1/tables/' + TABLE + '/rows', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + PAT,
          'x-bot-id':      BOT_ID,
          'Content-Type':  'application/json'
        },
        body: JSON.stringify({
          rows: [{ UserId: currentUserId, Session: currentSession,
                   ReviewSession: currentReviewSession,
                   VariableName: fullName, VariableValue: variableValue }]
        })
      })
      .then(function(res) {
        if (res.ok) {
          setStatus('success', '✓ Logged: ' + fullName + '  |  ' + variableValue);
        } else {
          res.text().then(function(t){ setStatus('error', '✗ API error ('+res.status+'): '+t); });
        }
      })
      .catch(function(e){ setStatus('error', '✗ Network error: ' + e.message); });
    }

    // ── CSS injection into shadow roots for reliable hiding ──
    const styledRoots = new WeakSet();
    function injectHideCSS(shadowRoot) {
      if (styledRoots.has(shadowRoot)) return;
      styledRoots.add(shadowRoot);
      var s = document.createElement('style');
      s.textContent = '[data-vtm-hide]{display:none!important;height:0!important;' +
        'min-height:0!important;overflow:hidden!important;margin:0!important;' +
        'padding:0!important;visibility:hidden!important;border:none!important;}';
      shadowRoot.appendChild(s);
    }

    // ── Hide a marker message bubble ─────────────────────────
    // Botpress renders __text__ as Markdown bold (strips the __),
    // so we walk up and find the message container by structure.
    function hideBubble(textNode) {
      var HIDE = ';display:none!important;height:0!important;min-height:0!important;' +
                 'overflow:hidden!important;margin:0!important;padding:0!important;' +
                 'border:none!important;visibility:hidden!important;';
      function doHide() {
        var el = textNode.parentElement;
        var levels = [];
        // Collect ancestor chain up to shadow root boundary
        while (el) {
          levels.push(el);
          var par = el.parentNode;
          if (par && par.nodeType === 11) {
            injectHideCSS(par);   // inject hide-CSS into this shadow root
            break;
          }
          el = el.parentElement;
        }
        // Strategy: first ancestor whose parent holds 3+ children
        // = this element is one message among many → correct target
        var target = null;
        for (var i = 2; i < levels.length - 1; i++) {
          if (levels[i].parentNode && levels[i].parentNode.childElementCount >= 3) {
            target = levels[i];
            break;
          }
        }
        // Fallback: level 7 or 8 up
        if (!target) target = levels[7] || levels[6] || levels[5];
        if (target) {
          target.setAttribute('data-vtm-hide', '1');
          target.style.cssText += HIDE;
        }
      }
      doHide();
      setTimeout(doHide, 150);
      setTimeout(doHide, 500);
    }

    // ── Search shadow DOM for rendered marker bubbles and hide ─
    // Called after a message event fires (before DOM walker may run).
    function scheduleHideMarker(renderedPrefix) {
      function searchAndHide(root) {
        if (!root) return;
        root.childNodes.forEach(function(n) {
          if (n.nodeType === 3) {
            if (n.textContent.trim().toLowerCase().startsWith(renderedPrefix)) hideBubble(n);
          } else if (n.nodeType === 1) {
            if (n.shadowRoot) { injectHideCSS(n.shadowRoot); searchAndHide(n.shadowRoot); }
            searchAndHide(n);
          } else if (n.nodeType === 11) {
            searchAndHide(n);
          }
        });
      }
      function tryHide() {
        searchAndHide(document.getElementById('bp-embedded') || document.body);
      }
      setTimeout(tryHide, 80);
      setTimeout(tryHide, 300);
      setTimeout(tryHide, 700);
    }

    // ── Process a marker text node ────────────────────────────
    // Handles both __prefix:value__ (raw) and prefix:value
    // (Markdown-rendered — Botpress strips __ treating them as bold).
    function processMarker(text, textNode) {
      // Strip __ delimiters if present
      var clean = (text.startsWith('__') && text.endsWith('__'))
                  ? text.slice(2, -2).trim()
                  : text.trim();

      if (clean.startsWith('userid:')) {
        currentUserId = clean.slice(7).trim();
        setStatus('ready', 'UserId: ' + currentUserId);
      } else if (clean.startsWith('session:')) {
        currentSession = clean.slice(8).trim();
        setStatus('ready', 'Session: ' + currentSession);
      } else if (clean.startsWith('placement:')) {
        currentPlacement = clean.slice(10).trim();
        setStatus('ready', 'Placement: ' + currentPlacement);
      } else if (clean.startsWith('reviewsession:')) {
        currentReviewSession = clean.slice(14).trim();
        setStatus('ready', 'ReviewSession: ' + currentReviewSession);
      } else if (clean.startsWith('currentvideoclipno:')) {
        currentVideoClipNo = clean.slice(19).trim();
        setStatus('ready', 'Video clip no: ' + currentVideoClipNo);
      } else if (clean.startsWith('painscale:') || clean.startsWith('confscale:')) {
        // Just hide the rendered marker bubble; the widget itself is
        // triggered from readMarker (message-event path) to avoid double-show.
      } else {
        return; // not our marker
      }
      hideBubble(textNode);
    }

    // ── Log row for audio (no Review Session special case) ───
    function logAudioRow(variableName, variableValue) {
      var fullName = variableName + ' - ' + currentPlacement;
      setStatus('', 'Logging: ' + fullName + '...');
      fetch('https://api.botpress.cloud/v1/tables/' + TABLE + '/rows', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + PAT,
          'x-bot-id':      BOT_ID,
          'Content-Type':  'application/json'
        },
        body: JSON.stringify({
          rows: [{ UserId: currentUserId, Session: currentSession,
                   VariableName: fullName, VariableValue: variableValue }]
        })
      })
      .then(function(res) {
        if (res.ok) {
          setStatus('success', '✓ Logged: ' + fullName + '  |  ' + variableValue);
        } else {
          res.text().then(function(t){ setStatus('error', '✗ API error ('+res.status+'): '+t); });
        }
      })
      .catch(function(e){ setStatus('error', '✗ Network error: ' + e.message); });
    }

    // ── Log ConversationId (once per page load, from client side) ──
    // VariableName = "ConversationId", VariableValue = actual conv_01... ID
    // Waits until both userId and session markers have arrived, then logs once.
    function logConvId() {
      if (_convIdLogged || !_currentConvId ||
          currentUserId === 'unknown' || !currentSession) return;
      _convIdLogged = true;
      console.log('[VideoTrack] Logging ConversationId:', _currentConvId);
      fetch('https://api.botpress.cloud/v1/tables/' + TABLE + '/rows', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + PAT,
          'x-bot-id':      BOT_ID,
          'Content-Type':  'application/json'
        },
        body: JSON.stringify({
          rows: [{ UserId: currentUserId, Session: currentSession,
                   VariableName: 'ConversationIdByHTML', VariableValue: _currentConvId }]
        })
      })
      .then(function(res) {
        if (res.ok) {
          setStatus('success', '✓ ConversationId logged: ' + _currentConvId);
        } else {
          res.text().then(function(t) { console.error('[VideoTrack] ConvId API error:', t); });
        }
      })
      .catch(function(e) { console.error('[VideoTrack] ConvId log error:', e.message); });
    }

    // ── Lightbox ─────────────────────────────────────────────
    var _lbBox   = document.getElementById('vt-lightbox');
    var _lbImg   = document.getElementById('vt-lightbox-img');
    var _lbClose = document.getElementById('vt-lightbox-close');

    function openLightbox(src) {
      _lbImg.src = src;
      _lbBox.classList.add('open');
    }
    function closeLightbox() {
      _lbBox.classList.remove('open');
      _lbImg.src = '';
    }

    _lbBox.addEventListener('click', closeLightbox);
    _lbImg.addEventListener('click', function(e) { e.stopPropagation(); });
    _lbClose.addEventListener('click', function(e) { e.stopPropagation(); closeLightbox(); });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });

    // ── DOM walker — handles shadow roots + text nodes ────────
    const trackedVideos = new WeakSet();
    const trackedAudios = new WeakSet();
    const trackedImages = new WeakSet();
    const observedRoots = new WeakSet();
    const observer      = new MutationObserver(scanAll);

    function observeRoot(root) {
      if (observedRoots.has(root)) return;
      observedRoots.add(root);
      observer.observe(root, { childList: true, subtree: true });
    }

    function walkNode(node) {
      if (!node) return;

      // TEXT NODE — check for marker patterns
      // Botpress renders __text__ as Markdown bold (strips __), so
      // we check both the raw format AND the rendered prefix:value format.
      if (node.nodeType === 3) {
        var t = node.textContent.trim();
        if (t.startsWith('__') && t.endsWith('__')) {
          processMarker(t, node);
        } else if (/^(userid:|session:|placement:|reviewsession:|currentvideoclipno:)/i.test(t)) {
          processMarker(t, node);
        }
        return;
      }

      // Only process element nodes and shadow roots beyond here
      if (node.nodeType !== 1 && node.nodeType !== 11) return;

      // VIDEO — attach tracking
      if (node.nodeType === 1 && node.tagName === 'VIDEO') {
        attachToVideo(node);
        return;
      }

      // AUDIO — attach tracking
      if (node.nodeType === 1 && node.tagName === 'AUDIO') {
        attachToAudio(node);
        return;
      }

      // IMAGE — attach enlarge button
      if (node.nodeType === 1 && node.tagName === 'IMG') {
        attachToImage(node);
        return;
      }

      // SHADOW ROOT — observe it and walk inside
      if (node.shadowRoot) {
        observeRoot(node.shadowRoot);
        walkNode(node.shadowRoot);
      }

      node.childNodes.forEach(walkNode);
    }

    function scanAll() {
      walkNode(document.getElementById('bp-embedded') || document.body);
    }

    // ── Landscape orientation when a video is enlarged (fullscreen) ──
    // Android Chrome: lock to landscape while any element is fullscreen.
    // iOS: no orientation-lock API, but its native fullscreen player rotates
    // to landscape on its own; the webkit* listeners below are harmless there.
    function lockLandscape() {
      try {
        var o = screen.orientation;
        if (o && o.lock) { var p = o.lock('landscape'); if (p && p.catch) p.catch(function(){}); }
      } catch (e) {}
    }
    function unlockOrientation() {
      try { var o = screen.orientation; if (o && o.unlock) o.unlock(); } catch (e) {}
    }
    var _fsWired = false;
    function wireFullscreenLandscape() {
      if (_fsWired) return; _fsWired = true;
      function onFs() {
        var fs = document.fullscreenElement || document.webkitFullscreenElement;
        if (fs) lockLandscape(); else unlockOrientation();
      }
      document.addEventListener('fullscreenchange', onFs);
      document.addEventListener('webkitfullscreenchange', onFs);
    }

    // iOS has no orientation-lock API, and its native fullscreen video stays
    // portrait when the phone is rotation-locked. So on iOS we present the video
    // in a custom overlay that CSS-rotates it 90° to fill the screen in landscape.
    var IS_IOS = /iP(hone|od|ad)/.test(navigator.platform || '') ||
                 (/Mac/.test(navigator.platform || '') && navigator.maxTouchPoints > 1) ||
                 /iPhone|iPad|iPod/.test(navigator.userAgent || '');
    var _vidPairs = [];   // {vid, btn} — positioned by the shared interval below
    var _vfs = null;      // active landscape overlay state
    function _vfsLayout() {
      if (!_vfs) return;
      var v = _vfs.v, portrait = window.innerHeight >= window.innerWidth;
      if (portrait) {
        v.setAttribute('style', 'position:absolute;top:50%;left:50%;width:' + window.innerHeight +
          'px;height:' + window.innerWidth + 'px;transform:translate(-50%,-50%) rotate(-90deg);' +
          'object-fit:contain;background:#000;');
      } else {
        v.setAttribute('style', 'position:absolute;top:50%;left:50%;width:100vw;height:100vh;' +
          'transform:translate(-50%,-50%);object-fit:contain;background:#000;');
      }
    }
    function _vfsEsc(e) { if (e.key === 'Escape') closeVideoLandscape(); }
    function openVideoLandscape(v) {
      if (_vfs) return;
      var overlay = document.createElement('div');
      overlay.id = 'vt-vfs';
      var ph = document.createComment('vt-vph');          // remember where to put the video back
      if (v.parentNode) v.parentNode.insertBefore(ph, v);
      var prevStyle = v.getAttribute('style') || '';
      overlay.appendChild(v);
      var x = document.createElement('button');
      x.className = 'vt-vfs-x'; x.textContent = '✕'; x.setAttribute('aria-label', 'Close');
      overlay.appendChild(x);
      document.body.appendChild(overlay);
      _vfs = { overlay: overlay, v: v, ph: ph, prevStyle: prevStyle };
      _vfsLayout();
      window.addEventListener('resize', _vfsLayout);
      window.addEventListener('orientationchange', _vfsLayout);
      document.addEventListener('keydown', _vfsEsc);
      x.addEventListener('click', closeVideoLandscape);
      try { if (v.play) { var pr = v.play(); if (pr && pr.catch) pr.catch(function(){}); } } catch (e) {}
    }
    function closeVideoLandscape() {
      var s = _vfs; if (!s) return; _vfs = null;
      window.removeEventListener('resize', _vfsLayout);
      window.removeEventListener('orientationchange', _vfsLayout);
      document.removeEventListener('keydown', _vfsEsc);
      s.v.setAttribute('style', s.prevStyle);
      if (s.ph && s.ph.parentNode) { s.ph.parentNode.insertBefore(s.v, s.ph); s.ph.remove(); }
      s.overlay.remove();
    }

    function attachToVideo(v) {
      if (trackedVideos.has(v)) return;
      trackedVideos.add(v);
      setStatus('ready', 'Video detected — listeners attached');
      wireFullscreenLandscape();
      // iOS native fullscreen player uses these element-level events.
      v.addEventListener('webkitbeginfullscreen', lockLandscape);
      v.addEventListener('webkitendfullscreen', unlockOrientation);
      // On iOS, add our own landscape-fullscreen button (native fullscreen can't
      // be forced to landscape when the phone is rotation-locked in portrait).
      if (IS_IOS) {
        try { v.setAttribute('controlsList', 'nofullscreen'); } catch (e) {}
        var vbtn = document.createElement('button');
        vbtn.className = 'vt-vid-btn';
        vbtn.innerHTML = '&#10530;';   // ⤢ diagonal expand
        vbtn.title = 'Fullscreen (landscape)';
        vbtn.setAttribute('aria-label', 'Fullscreen landscape');
        document.body.appendChild(vbtn);
        _vidPairs.push({ vid: v, btn: vbtn });
        vbtn.addEventListener('click', function (e) { e.stopPropagation(); openVideoLandscape(v); });
      }
      // Make the card actually playable inside the chat embed. On iOS/iPad a
      // <video> without playsinline tries to open a fullscreen player that the
      // webchat iframe can block → "cannot play". Force inline + visible controls.
      try {
        v.playsInline = true;
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.removeAttribute('autoplay');           // avoid blocked-autoplay failures; user taps play
        if (!v.hasAttribute('controls')) v.controls = true;
        v.preload = 'metadata';
      } catch (e) { console.warn('[VideoTrack] video setup:', e && e.message); }
      v.addEventListener('error', function(){
        var err = v.error ? ('code ' + v.error.code) : 'unknown';
        console.error('[VideoTrack] Video element error:', err, 'src=', v.currentSrc || v.src);
        setStatus('error', '✗ Video error (' + err + ')');
      });

      // ── Distinguish a scrub/drag (skip) from genuine play/pause ──
      // Dragging the progress bar fires seeking → seeked, and the browser usually
      // also emits a pause+play bracketing the seek. We log ONE "Drag Seek Video
      // (HK)" with the from→to position, and swallow the pause/play that belong to
      // the seek so they aren't recorded as real Play/Pause clicks.
      var _lastSteadyT = 0, _seekFrom = null, _seekSuppress = false, _seekClear = null, _seekLog = null;
      function _mmss(s){ s = Math.max(0, Math.round(s||0)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
      v.addEventListener('timeupdate', function(){ if (!v.seeking) _lastSteadyT = v.currentTime; });
      v.addEventListener('seeking', function(){
        if (_seekFrom === null) _seekFrom = _lastSteadyT;   // remember position before the drag
        _seekSuppress = true;
        if (_seekClear) clearTimeout(_seekClear);
      });
      v.addEventListener('seeked', function(){
        _seekSuppress = true;
        if (_seekLog) clearTimeout(_seekLog);
        // debounce so a multi-step drag collapses into one row at the final position
        _seekLog = setTimeout(function(){
          var from = (_seekFrom === null ? _lastSteadyT : _seekFrom), to = v.currentTime;
          _seekFrom = null;
          if (Math.abs(to - from) >= 0.5)   // ignore micro/no-op seeks (e.g. initial load)
            logRow('Drag Seek Video (HK)', hkNow() + '  (' + _mmss(from) + ' → ' + _mmss(to) + ')');
        }, 300);
        if (_seekClear) clearTimeout(_seekClear);
        _seekClear = setTimeout(function(){ _seekSuppress = false; }, 450);
      });

      v.addEventListener('play',  function(){ if (_seekSuppress || v.seeking) return; logRow('Click Play Video (HK)', hkNow()); });
      v.addEventListener('pause', function(){ if (v.ended || _seekSuppress || v.seeking) return; logRow('Click Pause Video (HK)', hkNow()); });
      v.addEventListener('ended', function(){ logRow('Video Watch End Time (HK)', hkNow()); });
    }

    function attachToAudio(a) {
      if (trackedAudios.has(a)) return;
      trackedAudios.add(a);
      setStatus('ready', 'Audio detected — listeners attached');
      // Hide the browser's native playback-speed button from the audio controls.
      try { a.setAttribute('controlsList', 'noplaybackrate'); } catch (e) {}
      a.addEventListener('play',  function(){ logAudioRow('Click Play Audio (HK)', hkNow()); });
      a.addEventListener('pause', function(){ if (!a.ended) logAudioRow('Click Pause Audio (HK)', hkNow()); });
      a.addEventListener('ended', function(){ logAudioRow('Audio Listen End Time (HK)', hkNow()); });
    }

    var _imgBtnSVG = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 6V1H6M10 1H15V6M15 10V15H10M6 15H1V10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    // Pairs of { img, btn } — updated on a 100ms interval so shadow-DOM
    // scroll (which doesn't bubble to window) is always caught.
    // Top edge of the Botpress input bar (composer), so the enlarge button
    // can hide behind it instead of floating on top of the input field.
    function composerTopY() {
      var sr = (typeof bpShadowRoot === 'function') ? bpShadowRoot() : null;
      var c  = sr && (sr.querySelector('.bpComposerInputContainer') ||
                      sr.querySelector('.bpComposerInput'));
      if (c) { var rc = c.getBoundingClientRect(); if (rc.height > 0) return rc.top; }
      return window.innerHeight;
    }

    var _imgPairs = [];
    setInterval(function() {
      var barTop = composerTopY();
      _imgPairs.forEach(function(p) {
        var r = p.img.getBoundingClientRect();
        var btnTop = Math.round(r.bottom - 38);
        var hidden = r.width < 60 || r.height < 60 ||
                     r.bottom <= 0 || r.top >= window.innerHeight ||
                     (btnTop + 32) > barTop;   // button would overlap the input bar → hide behind it
        p.btn.style.display = hidden ? 'none' : 'flex';
        if (!hidden) {
          p.btn.style.top  = btnTop + 'px';
          p.btn.style.left = Math.round(r.right  - 38) + 'px';
        }
      });
      // iOS landscape button sits at the video's top-right (native controls are at the bottom)
      _vidPairs.forEach(function(p) {
        var r = p.vid.getBoundingClientRect();
        var hidden = r.width < 80 || r.height < 60 || r.bottom <= 40 ||
                     r.top >= window.innerHeight - 20 || r.top + 42 > barTop;
        p.btn.style.display = hidden ? 'none' : 'flex';
        if (!hidden) {
          p.btn.style.top  = Math.round(r.top + 6) + 'px';
          p.btn.style.left = Math.round(r.right - 42) + 'px';
        }
      });
    }, 100);

    function attachToImage(img) {
      if (trackedImages.has(img)) return;
      // Skip tiny icons / avatars (< 60 px wide)
      if (img.complete && img.naturalWidth > 0 && img.naturalWidth < 60) return;
      // Skip circular images (bot logo / avatar — border-radius: 50%)
      var br = window.getComputedStyle(img).borderRadius || '';
      if (br.indexOf('50%') !== -1 || br === '9999px' || parseFloat(br) >= 9999) return;
      trackedImages.add(img);

      img.style.cursor = 'zoom-in';

      var btn = document.createElement('button');
      btn.className = 'vt-img-btn';
      btn.innerHTML = _imgBtnSVG;
      btn.title = 'Enlarge image';
      btn.setAttribute('aria-label', 'Enlarge image');
      document.body.appendChild(btn);
      _imgPairs.push({ img: img, btn: btn });

      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (img.src) openLightbox(img.src);
      });
      img.addEventListener('click', function() {
        if (img.src) openLightbox(img.src);
      });
    }

    // ── Read marker from message text ─────────────────────────
    function readMarker(rawText) {
      if (!rawText) return;
      var text = String(rawText).trim();
      console.log('[VideoTrack] Message text:', text);

      if (text.startsWith('__userid:') && text.endsWith('__')) {
        currentUserId = text.slice(9, -2).trim().replace(/\s+/g, '');
        setStatus('ready', 'UserId: ' + currentUserId);
        console.log('[VideoTrack] UserId set:', currentUserId);
        scheduleHideMarker('userid:');
        logConvId(); // log ConversationId if convId already captured & session is set
      } else if (text.startsWith('__session:') && text.endsWith('__')) {
        currentSession = text.slice(10, -2).trim();
        setStatus('ready', 'Session: ' + currentSession);
        console.log('[VideoTrack] Session set:', currentSession);
        scheduleHideMarker('session:');
        logConvId(); // log ConversationId if convId already captured & userId is set
      } else if (text.startsWith('__placement:') && text.endsWith('__')) {
        currentPlacement = text.slice(12, -2).trim();
        setStatus('ready', 'Placement: ' + currentPlacement);
        console.log('[VideoTrack] Placement set:', currentPlacement);
        scheduleHideMarker('placement:');
      } else if (text.startsWith('__reviewsession:') && text.endsWith('__')) {
        currentReviewSession = text.slice(16, -2).trim();
        setStatus('ready', 'ReviewSession: ' + currentReviewSession);
        console.log('[VideoTrack] ReviewSession set:', currentReviewSession);
        scheduleHideMarker('reviewsession:');
      } else if (text.startsWith('__currentvideoclipno:') && text.endsWith('__')) {
        currentVideoClipNo = text.slice(21, -2).trim();
        setStatus('ready', 'Video clip no: ' + currentVideoClipNo);
        console.log('[VideoTrack] Video clip no set:', currentVideoClipNo);
        scheduleHideMarker('currentvideoclipno:');
      } else if (text.startsWith('__painscale:') && text.endsWith('__')) {
        var spec  = text.slice(12, -2).trim();          // e.g. "0-10"
        var parts = spec.split('-');
        var mn = parseInt(parts[0], 10); if (isNaN(mn)) mn = 0;
        var mx = parseInt(parts[1], 10); if (isNaN(mx)) mx = 10;
        console.log('[VideoTrack] Pain scale widget:', mn, '-', mx);
        scheduleHideMarker('painscale:');
        showPainScale(mn, mx, true);          // colored green→red
      } else if (text.startsWith('__confscale:') && text.endsWith('__')) {
        var cspec  = text.slice(12, -2).trim();         // e.g. "0-10"
        var cparts = cspec.split('-');
        var cmn = parseInt(cparts[0], 10); if (isNaN(cmn)) cmn = 0;
        var cmx = parseInt(cparts[1], 10); if (isNaN(cmx)) cmx = 10;
        console.log('[VideoTrack] Confidence scale widget:', cmn, '-', cmx);
        scheduleHideMarker('confscale:');
        showPainScale(cmn, cmx, true);        // colored, same as pain scale
      }
    }

    // ── Mobile/iPad UX helpers ───────────────────────────────
    // Find the Botpress webchat shadow root (it renders in one).
    function bpShadowRoot() {
      var els = document.querySelectorAll('*');
      for (var i = 0; i < els.length; i++) {
        if (els[i].shadowRoot && els[i].shadowRoot.querySelector('.bpComposerInput')) {
          return els[i].shadowRoot;
        }
      }
      return null;
    }
    // Find the scrollable messages container inside the shadow root.
    function bpScrollEl(sr) {
      if (!sr) return null;
      var ds = sr.querySelectorAll('div');
      for (var i = 0; i < ds.length; i++) {
        var cs = getComputedStyle(ds[i]);
        if ((cs.overflowY === 'auto' || cs.overflowY === 'scroll') &&
            ds[i].scrollHeight > ds[i].clientHeight + 20) {
          return ds[i];
        }
      }
      return null;
    }
    function scrollChatToBottom() {
      var sr = bpShadowRoot();
      var sc = bpScrollEl(sr) ||
               (sr && (sr.querySelector('.bpMessageListContainer') ||
                       sr.querySelector('.bpMessageListViewport')));
      if (sc) sc.scrollTop = sc.scrollHeight;
      // Also nudge the painscale widget into view if present.
      if (_painScaleEl && _painScaleEl.scrollIntoView) {
        try { _painScaleEl.scrollIntoView({ block: 'end' }); } catch (e) {}
      }
    }
    // Scroll to bottom over a few frames so late-rendered content is caught.
    function scrollChatToBottomSoon() {
      [0, 120, 350, 700].forEach(function (d) { setTimeout(scrollChatToBottom, d); });
    }
    // Collapse the on-screen keyboard by blurring the composer input.
    function blurComposer() {
      var sr = bpShadowRoot();
      var ta = sr && sr.querySelector('.bpComposerInput');
      if (ta) ta.blur();
      // Also blur whatever is focused inside the shadow root, just in case.
      if (sr && sr.activeElement && sr.activeElement.blur) sr.activeElement.blur();
    }
    // Fix vertical clipping of the composer text on mobile (esp. CJK):
    // the default input is short with a tight line-height, so tall glyphs
    // get cut off. Inject CSS into the shadow root to add room + center it.
    var _composerFixed = false;
    function fixComposerInput() {
      var sr = bpShadowRoot();
      if (!sr || _composerFixed) return;
      _composerFixed = true;
      var st = document.createElement('style');
      st.id = 'vt-composer-fix';
      st.textContent =
        '.bpComposerInput{line-height:1.5!important;padding-top:5px!important;' +
        'padding-bottom:5px!important;min-height:40px!important;}' +
        '.bpComposerInputContainer{align-items:center!important;min-height:50px!important;}';
      sr.appendChild(st);
    }

    var _uxWired = false;
    function enhanceMobileUX() {
      var sr = bpShadowRoot();
      if (!sr || _uxWired) return;
      _uxWired = true;
      fixComposerInput();

      // 1) Collapse keyboard when the user sends a message.
      //    a) Enter (without Shift) in the composer.
      sr.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey &&
            e.target && e.target.classList &&
            e.target.classList.contains('bpComposerInput')) {
          // Let Botpress send first, then drop focus to dismiss the keyboard.
          setTimeout(blurComposer, 50);
          scrollChatToBottomSoon();
          hidePainScale();   // user answered by typing → remove the scale widget
        }
      }, true);
      //    b) Tapping the Send icon (SVG aria-label="Send Message Button").
      sr.addEventListener('click', function (e) {
        var t = e.target;
        var hit = t && (t.closest ? t.closest('[aria-label="Send Message Button"]') : null);
        if (!hit && t && t.getAttribute && t.getAttribute('aria-label') === 'Send Message Button') hit = t;
        if (hit) {
          setTimeout(blurComposer, 50);
          scrollChatToBottomSoon();
          hidePainScale();   // user answered by typing → remove the scale widget
        }
      }, true);

      // 2) Auto-scroll to the newest message. Pin to bottom when the user is
      //    already near the bottom (don't yank them if they scrolled up to read).
      var sc = bpScrollEl(sr);
      if (sc) {
        var mo = new MutationObserver(function () {
          var nearBottom = (sc.scrollHeight - sc.scrollTop - sc.clientHeight) < 250;
          if (nearBottom) sc.scrollTop = sc.scrollHeight;
        });
        mo.observe(sc, { childList: true, subtree: true });
      }
    }

    // ── Pain-scale quick-select widget ───────────────────────
    // Triggered by the bot marker __painscale:MIN-MAX__ (e.g. 0-10).
    // Renders a colored, one-tap number strip INLINE in the conversation
    // flow (after the latest message) so it never covers the question
    // text; on tap it sends the number back to the bot as the reply.
    var _painScaleEl   = null;
    var _psObserver    = null;
    var _psAttachTries = 0;

    // NRS pain-scale color at position t (0..1), matching the chart image:
    // blue(0) → green → yellow → orange → red(10).
    function nrsColor(t) {
      var stops = [
        [0.00, [ 93, 160, 176]],  // blue-teal  (0 / 無痛)
        [0.20, [147, 190, 126]],  // green      (~2)
        [0.40, [214, 208, 107]],  // yellow-grn (~4)
        [0.55, [240, 216,  94]],  // yellow     (~5-6)
        [0.70, [235, 162,  76]],  // orange     (~7)
        [0.85, [222, 110,  60]],  // red-orange (~9)
        [1.00, [199,  64,  47]]   // red        (10 / 劇痛)
      ];
      if (t <= 0) return stops[0][1];
      if (t >= 1) return stops[stops.length - 1][1];
      for (var i = 1; i < stops.length; i++) {
        if (t <= stops[i][0]) {
          var a = stops[i - 1], b = stops[i];
          var f = (t - a[0]) / (b[0] - a[0]);
          return [
            Math.round(a[1][0] + (b[1][0] - a[1][0]) * f),
            Math.round(a[1][1] + (b[1][1] - a[1][1]) * f),
            Math.round(a[1][2] + (b[1][2] - a[1][2]) * f)
          ];
        }
      }
      return stops[stops.length - 1][1];
    }

    function buildPainScale(min, max, colored) {
      // NOTE: the widget is appended INSIDE Botpress's shadow DOM, where the
      // document's <style> rules don't reach. So all styling is inline.
      // colored=true → green→red gradient (pain); false → plain neutral (confidence).
      var wrap = document.createElement('div');
      wrap.id = 'vt-painscale';
      wrap.style.cssText = 'box-sizing:border-box;align-self:stretch;' +
        'padding:4px 14px 16px 14px;';
      var inner = document.createElement('div');
      inner.className = 'vt-ps-inner';
      inner.style.cssText = 'display:flex;gap:4px;width:100%;max-width:560px;';
      var span = (max - min) || 1;
      for (var n = min; n <= max; n++) {
        (function (num) {
          var cell = document.createElement('button');
          cell.type = 'button';
          cell.className = 'vt-ps-cell';
          cell.textContent = String(num);
          var bg, fg;
          if (colored) {
            var c   = nrsColor((num - min) / span);   // matches NRS chart palette
            bg = 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';
            // dark text on light cells (yellow/green) for readability, else white
            var lum = (0.299 * c[0] + 0.587 * c[1] + 0.114 * c[2]) / 255;
            fg = lum > 0.62 ? '#374151' : '#fff';
          } else {
            bg = '#e9edf1'; fg = '#1f2937';    // plain neutral
          }
          cell.style.cssText = 'flex:1 1 0;min-width:0;min-height:42px;border:none;' +
            'border-radius:8px;color:' + fg + ';font-family:sans-serif;font-size:15px;' +
            'font-weight:700;line-height:1;cursor:pointer;padding:0;' +
            'box-shadow:inset 0 0 0 1px rgba(0,0,0,0.06);' +
            '-webkit-tap-highlight-color:transparent;' +
            'background:' + bg + ';';
          cell.addEventListener('click', function (e) {
            e.stopPropagation();
            if (cell.classList.contains('sel')) return;  // guard double-tap
            cell.classList.add('sel');
            cell.style.outline = '3px solid #1a1a2e';
            cell.style.outlineOffset = '-1px';
            cell.style.transform = 'translateY(-2px)';
            try {
              if (window.botpress && typeof window.botpress.sendMessage === 'function') {
                window.botpress.sendMessage(String(num));
                console.log('[VideoTrack] Scale answer sent:', num);
              } else {
                console.error('[VideoTrack] botpress.sendMessage unavailable');
              }
            } catch (err) {
              console.error('[VideoTrack] Scale send error:', err);
            }
            setTimeout(hidePainScale, 220);
          });
          inner.appendChild(cell);
        })(n);
      }
      wrap.appendChild(inner);
      return wrap;
    }

    // The container holding the message rows (always present once webchat is
    // ready, regardless of whether it currently overflows/scrolls).
    function painScaleContainer() {
      var sr = bpShadowRoot();
      if (!sr) return null;
      return sr.querySelector('.bpMessageListViewport') ||
             sr.querySelector('.bpMessageListContainer') ||
             bpScrollEl(sr);
    }

    // Append the strip into the message list as the last child so it sits
    // right under the newest message and flows/scrolls with the conversation.
    function attachPainScaleInline() {
      if (!_painScaleEl) return;
      var c = painScaleContainer();
      if (!c) {                        // shadow DOM not ready yet → retry briefly
        if (_psAttachTries++ < 25) setTimeout(attachPainScaleInline, 150);
        return;
      }
      _psAttachTries = 0;
      if (c.lastElementChild !== _painScaleEl) c.appendChild(_painScaleEl);
      scrollChatToBottomSoon();
      if (!_psObserver) {
        // Keep it attached & pinned to the bottom across Botpress re-renders.
        _psObserver = new MutationObserver(function () {
          if (!_painScaleEl) return;
          var cc = painScaleContainer();
          if (!cc) return;
          if (_painScaleEl.parentNode !== cc || cc.lastElementChild !== _painScaleEl) {
            cc.appendChild(_painScaleEl);   // bounded: once it's last, no more action
          }
        });
        _psObserver.observe(c, { childList: true });
      }
    }

    function showPainScale(min, max, colored) {
      hidePainScale();
      _painScaleEl = buildPainScale(min, max, colored !== false);
      attachPainScaleInline();
    }

    function hidePainScale() {
      if (_psObserver) { _psObserver.disconnect(); _psObserver = null; }
      if (_painScaleEl) { _painScaleEl.remove(); _painScaleEl = null; }
      _psAttachTries = 0;
    }

    // ── Boot ─────────────────────────────────────────────────
    window.addEventListener('load', function () {
      if (!window.botpress) {
        setStatus('error', 'window.botpress not found');
        return;
      }
      setStatus('', 'Waiting for webchat...');

      function onReady() {
        setStatus('ready', 'Webchat ready — watching for video');
        var container = document.getElementById('bp-embedded') || document.body;
        observeRoot(container);
        scanAll();
        enhanceMobileUX();
        var retries = 0;
        var t = setInterval(function(){ scanAll(); enhanceMobileUX(); if (++retries >= 20) clearInterval(t); }, 500);
      }
      window.botpress.on('ready',         onReady);
      window.botpress.on('webchat:ready', onReady);

      // ── Read markers from message event payload ─────────────
      function onMessage(msg) {
        if (!msg) return;

        // Log FULL message (no truncation) to debug structure
        console.log('[VideoTrack] FULL MSG:', JSON.stringify(msg));

        // ── Capture ConversationId from this message (client-side, always accurate) ──
        var cid = msg.conversationId || msg.conversation_id ||
                  (msg.conversation && msg.conversation.id) || '';
        if (cid && !_currentConvId) {
          _currentConvId = cid;
          console.log('[VideoTrack] ConversationId captured:', cid);
          logConvId(); // may no-op if userId/session not yet set — will retry on their markers
        }

        // Botpress webchat v3: msg.block = {type:"bubble", block:{type:"text", text:"..."}}
        var text = '';
        var b = msg.block || msg.payload || {};
        // Unwrap the bubble wrapper — the real content is one level deeper
        var inner = (b && b.block) ? b.block : b;

        // Try every known location the text might live
        if (inner.text)                       text = inner.text;
        else if (inner.body)                  text = inner.body;
        else if (b.text)                      text = b.text;
        else if (b.body)                      text = b.body;
        else if (b.payload && b.payload.text) text = b.payload.text;
        else if (msg.text)                    text = msg.text;
        else if (typeof b === 'string')       text = b;

        console.log('[VideoTrack] Extracted text:', text);
        readMarker(text);

        // Auto-scroll to the newest incoming message (mobile/iPad UX).
        scrollChatToBottomSoon();
      }
      window.botpress.on('message',         onMessage);
      window.botpress.on('webchat:message', onMessage);
    });

    // ── Debug mode: show status bar when ?debug in URL ───────
    if (new URLSearchParams(window.location.search).has('debug')) {
      document.getElementById('vt-status-bar').style.display = 'flex';
      // Manual triggers for testing the pain-scale widget without the bot:
      //   __vtPainScale.show(0,10)  /  __vtPainScale.hide()
      window.__vtPainScale = { show: showPainScale, hide: hidePainScale };
      // Test the landscape video overlay: __vtVideoLandscape.open(videoEl) / .close()
      window.__vtVideoLandscape = { open: openVideoLandscape, close: closeVideoLandscape, isIOS: IS_IOS };
    }

    setStatus('', 'Script loaded — waiting for page...');

  })();
  </script>

</body>
