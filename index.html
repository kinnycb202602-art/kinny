                console.error('[VideoTrack] botpress.sendMessage unavailable');
              }
            } catch (err) {
              console.error('[VideoTrack] Scale send error:', err);
            }
            beginPostSendLock();   // answered a scale → lock until the bot replies
            setTimeout(hidePainScale, 220);
          });
          inner.appendChild(cell);
        })(n);
      }
      wrap.appendChild(inner);
      return wrap;
    }

    // The container holding the message rows (always present once webchat is
    // ready, regardless of whether it currently overflows/scrolls).
    function painScaleContainer() {
      var sr = bpShadowRoot();
      if (!sr) return null;
      return sr.querySelector('.bpMessageListViewport') ||
             sr.querySelector('.bpMessageListContainer') ||
             bpScrollEl(sr);
    }

    // Append the strip into the message list as the last child so it sits
    // right under the newest message and flows/scrolls with the conversation.
    function attachPainScaleInline() {
      if (!_painScaleEl) return;
      var c = painScaleContainer();
      if (!c) {                        // shadow DOM not ready yet → retry briefly
        if (_psAttachTries++ < 25) setTimeout(attachPainScaleInline, 150);
        return;
      }
      _psAttachTries = 0;
      if (c.lastElementChild !== _painScaleEl) c.appendChild(_painScaleEl);
      scrollChatToBottomSoon();
      if (!_psObserver) {
        // Keep it attached & pinned to the bottom across Botpress re-renders.
        _psObserver = new MutationObserver(function () {
          if (!_painScaleEl) return;
          var cc = painScaleContainer();
          if (!cc) return;
          if (_painScaleEl.parentNode !== cc || cc.lastElementChild !== _painScaleEl) {
            cc.appendChild(_painScaleEl);   // bounded: once it's last, no more action
          }
        });
        _psObserver.observe(c, { childList: true });
      }
    }

    function showPainScale(min, max, colored, palette) {
      hidePainScale();
      _painScaleEl = buildPainScale(min, max, colored !== false, palette);
      attachPainScaleInline();
      refreshComposerLock();   // widget on screen → typing locked
    }

    function hidePainScale() {
      if (_psObserver) { _psObserver.disconnect(); _psObserver = null; }
      if (_painScaleEl) { _painScaleEl.remove(); _painScaleEl = null; }
      _psAttachTries = 0;
      _menuKey = '';
      if (typeof refreshComposerLock === 'function') refreshComposerLock();
    }

    // ── Single / multiple choice widget ──────────────────────
    // Triggered by __KEY:singlechoice:o1|o2|…__  or  __KEY:multiplechoice:o1|o2|…__
    // Single choice: one tap sends the option text. Multiple choice: toggle
    // options, then tap 確認 to send them joined with "/" (e.g. 上午/下午).
    // Rendered inline (reuses the pain-scale inline attach) → all styles inline
    // because it lives inside Botpress's shadow DOM.
    function sendChoice(str) {
      try {
        if (window.botpress && typeof window.botpress.sendMessage === 'function') {
          window.botpress.sendMessage(String(str));
          console.log('[VideoTrack] Choice sent:', str);
        } else {
          console.error('[VideoTrack] botpress.sendMessage unavailable');
        }
      } catch (err) { console.error('[VideoTrack] Choice send error:', err); }
      beginPostSendLock();   // answered a choice → lock until the bot replies
    }
    function buildChoice(type, options) {
      var multi = (type === 'multiplechoice');
      var wrap = document.createElement('div');
      wrap.id = 'vt-choice';
      // Left padding aligns the buttons with the bot message bubble's left edge:
      // the bubble is inset by the avatar (--bpSpacing-7) + row gap (--bpSpacing-2).
      // These Botpress vars resolve inside its shadow DOM (where this widget lives).
      wrap.style.cssText = 'box-sizing:border-box;align-self:stretch;' +
        'padding:4px 14px 16px calc(var(--bpSpacing-7, 28px) + var(--bpSpacing-2, 8px));';
      var inner = document.createElement('div');
      // Word-cloud layout: options wrap onto as many rows as needed so every
      // choice is visible at once (no horizontal scrolling on small screens).
      inner.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;';
      var OFF = 'background:#e6f2ec;color:#1f3a30;border-color:#c3ddcf;';
      var ON  = 'background:#2f7d63;color:#fff;border-color:#2f7d63;';
      var BASE = 'border:1px solid #c3ddcf;border-radius:12px;padding:11px 18px;' +
                 'font-family:sans-serif;font-size:16px;font-weight:600;cursor:pointer;' +
                 'line-height:1.2;-webkit-tap-highlight-color:transparent;' +
                 'white-space:nowrap;flex:0 0 auto;';
      var selected = [];
      var confirmBtn = null;
      function paint(b, on) { b.style.cssText = BASE + (on ? ON : OFF); }
      function updateConfirm() {
        if (!confirmBtn) return;
        var n = selected.length;
        confirmBtn.disabled = (n === 0);
        confirmBtn.style.opacity = n === 0 ? '0.45' : '1';
        confirmBtn.style.cursor  = n === 0 ? 'default' : 'pointer';
        confirmBtn.textContent = n ? ('確認 (' + n + ')') : '確認';
      }
      options.forEach(function (opt) {
        var b = document.createElement('button');
        b.type = 'button';
        b.textContent = opt;
        paint(b, false);
        if (multi) {
          b.addEventListener('click', function (e) {
            e.stopPropagation();
            var i = selected.indexOf(opt);
            if (i >= 0) { selected.splice(i, 1); paint(b, false); }
            else { selected.push(opt); paint(b, true); }
            updateConfirm();
          });
        } else {
          b.addEventListener('click', function (e) {
            e.stopPropagation();
            if (wrap._done) return; wrap._done = true;
            paint(b, true);
            sendChoice(opt);
            setTimeout(hidePainScale, 220);
          });
        }
        inner.appendChild(b);
      });
      wrap.appendChild(inner);
      if (multi) {
        var row = document.createElement('div');
        // Confirm sits under the first option (left-aligned), not off to the right.
        row.style.cssText = 'display:flex;justify-content:flex-start;margin-top:10px;';
        confirmBtn = document.createElement('button');
        confirmBtn.type = 'button';
        confirmBtn.style.cssText = 'border:none;border-radius:12px;padding:11px 24px;' +
          'font-family:sans-serif;font-size:16px;font-weight:700;background:#2f7d63;color:#fff;' +
          'line-height:1.2;-webkit-tap-highlight-color:transparent;';
        confirmBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          if (!selected.length || wrap._done) return; wrap._done = true;
          sendChoice(selected.join('/'));         // e.g. 上午/下午 (string, not array)
          setTimeout(hidePainScale, 220);
        });
        updateConfirm();
        row.appendChild(confirmBtn);
        wrap.appendChild(row);
      }
      return wrap;
    }
    function showChoice(type, options) {
      if (!options || !options.length) return;
      hidePainScale();                       // one inline widget at a time
      _painScaleEl = buildChoice(type, options);
      attachPainScaleInline();
      refreshComposerLock();   // widget on screen → typing locked
    }

    // ── Session-menu widget ──────────────────────────────────
    // Triggered by the bot sending two raw numbers; the FRONT-END does the
    // enable/disable logic:
    //   __sessionmenu:current=C;finished=F__
    // Renders (up to) two rows — 🚀 開始新進度 and 🎒 溫習舊內容 — each a header
    // label followed by "第 n 節" buttons on the same line. Enabled buttons are
    // tappable and send just the number; disabled ones are greyed. Logic:
    //   • 開始新進度: sessions finished+1 … current; ONLY finished+1 is enabled
    //     (the next one you may start), the rest are shown but disabled.
    //   • 溫習舊內容: sessions 1 … finished, all enabled.
    //   A group with no sessions is omitted entirely.
    function parseSessionMenu(spec) {
      var p = {};
      spec.split(/[;,]/).forEach(function (kv) {
        var eq = kv.indexOf('=');
        if (eq < 0) return;
        var k = kv.slice(0, eq).trim().toLowerCase();
        var v = parseInt(kv.slice(eq + 1).trim(), 10);
        if (!isNaN(v)) p[k] = v;
      });
      var current = p.current  || 0;                 // current_session (highest unlocked)
      var fin     = p.finished || 0;                 // largest_finished_session
      var groups = [];
      var g1 = [];
      for (var n = fin + 1; n <= current; n++) {
        g1.push({ num: n, on: (n === fin + 1) });    // only the immediate next session is startable
      }
      if (g1.length) groups.push({ header: '🚀 開始新進度：', items: g1 });
      var g2 = [];
      for (var m = 1; m <= fin; m++) {
        g2.push({ num: m, on: true });               // every finished session is reviewable
      }
      if (g2.length) groups.push({ header: '🎒 溫習舊內容：', items: g2 });
      return groups;
    }
    function buildSessionMenu(groups) {
      var wrap = document.createElement('div');
      wrap.id = 'vt-sessionmenu';
      wrap.style.cssText = 'box-sizing:border-box;align-self:stretch;' +
        'padding:4px 14px 16px calc(var(--bpSpacing-7, 28px) + var(--bpSpacing-2, 8px));';
      // Buttons match the exercise (上午/下午) choice pills: 16px, rounded,
      // light-green when tappable, solid green on tap, grey when disabled.
      // Button text is not bold; the group title above is bold.
      var BASE = 'border:1px solid #c3ddcf;border-radius:12px;padding:11px 18px;' +
                 'font-family:sans-serif;font-size:16px;font-weight:400;line-height:1.2;' +
                 '-webkit-tap-highlight-color:transparent;white-space:nowrap;flex:0 0 auto;';
      var ENA = 'background:#e6f2ec;color:#1f3a30;cursor:pointer;';                 // tappable
      var SEL = 'background:#2f7d63;color:#fff;border-color:#2f7d63;cursor:pointer;'; // on tap
      var DIS = 'background:#f0f2f4;color:#aeb6bd;border-color:#e6eaed;cursor:not-allowed;';
      groups.forEach(function (g) {
        var group = document.createElement('div');
        group.style.cssText = 'margin-bottom:16px;';
        if (g.header) {
          var h = document.createElement('div');   // title on its own line
          h.textContent = g.header;
          h.style.cssText = 'font-family:sans-serif;font-size:16px;font-weight:700;' +
                            'color:#1f3a30;margin-bottom:8px;';
          group.appendChild(h);
        }
        var btnRow = document.createElement('div');  // buttons on the next line, wrapping
        btnRow.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;';
        g.items.forEach(function (it) {
          var b = document.createElement('button');
          b.type = 'button';
          b.textContent = '第 ' + it.num + ' 節';
          if (it.on) {
            b.style.cssText = BASE + ENA;
            (function (num) {
              b.addEventListener('click', function (e) {
                e.stopPropagation();
                if (wrap._done) return; wrap._done = true;
                if (_menuKey) _menuAnswered[_menuKey] = true;   // answered → don't let the lingering marker resurrect it
                b.style.cssText = BASE + SEL;      // selected feedback (like the exercise widget)
                sendChoice(String(num));           // send just the number
                setTimeout(hidePainScale, 220);
              });
            })(it.num);
          } else {
            b.disabled = true;
            b.style.cssText = BASE + DIS;
          }
          btnRow.appendChild(b);
        });
        group.appendChild(btnRow);
        wrap.appendChild(group);
      });
      return wrap;
    }
    var _menuKey = '';
    var _menuAnswered = {};
    function showSessionMenu(groups, key) {
      if (!groups || !groups.length) return;
      key = key || '';
      // Re-appears on re-trigger while UNANSWERED (the marker lingers in the DOM
      // and the observer re-fires), but once the user taps a session it stays
      // hidden — the click handler records the key in _menuAnswered.
      if (key && _menuAnswered[key]) return;
      if (_painScaleEl && _menuKey && _menuKey === key) return;   // already showing this exact menu
      hidePainScale();
      _menuKey = key;
      _painScaleEl = buildSessionMenu(groups);
      attachPainScaleInline();
      refreshComposerLock();   // widget on screen → typing locked
    }

    // ── Boot ─────────────────────────────────────────────────
    window.addEventListener('load', function () {
      if (!window.botpress) {
        setStatus('error', 'window.botpress not found');
        return;
      }
      setStatus('', 'Waiting for webchat...');

      function onReady() {
        setStatus('ready', 'Webchat ready — watching for video');
        if (!_readyAt) _readyAt = Date.now();
        var container = document.getElementById('bp-embedded') || document.body;
        observeRoot(container);
        scanAll();
        enhanceMobileUX();
        var retries = 0;
        var t = setInterval(function(){ scanAll(); enhanceMobileUX(); refreshComposerLock(); if (++retries >= 20) clearInterval(t); }, 500);
        // Keep re-evaluating the welcome/Start-button layout a bit longer, since
        // the composer/marquee can render slightly after 'ready' fires.
        var st = 0; var t2 = setInterval(function(){ updateStartUI(); if (++st >= 12) clearInterval(t2); }, 250);
      }
      window.botpress.on('ready',         onReady);
      window.botpress.on('webchat:ready', onReady);

      // Best-effort direction check so the user's own outgoing text is never
      // mistaken for a bot reply. Unknown → treated as a bot message.
      function looksLikeUserMessage(msg) {
        var d = msg.direction || (msg.payload && msg.payload.direction) ||
                (msg.message && msg.message.direction) || '';
        if (d) return /out|user|visitor|guest/i.test(String(d));
        if (msg.isBot === true || msg.authorRole === 'bot') return false;
        if (msg.authorId != null) return /user|visitor|guest/i.test(String(msg.authorId));
        return false;
      }

      // ── Read markers from message event payload ─────────────
      function onMessage(msg) {
        if (!msg) return;

        // Log FULL message (no truncation) to debug structure
        console.log('[VideoTrack] FULL MSG:', JSON.stringify(msg));

        // ── Capture ConversationId from this message (client-side, always accurate) ──
        var cid = msg.conversationId || msg.conversation_id ||
                  (msg.conversation && msg.conversation.id) || '';
        if (cid && !_currentConvId) {
          _currentConvId = cid;
          console.log('[VideoTrack] ConversationId captured:', cid);
          logConvId(); // may no-op if userId/session not yet set — will retry on their markers
        }

        // Botpress webchat v3: msg.block = {type:"bubble", block:{type:"text", text:"..."}}
        var text = '';
        var b = msg.block || msg.payload || {};
        // Unwrap the bubble wrapper — the real content is one level deeper
        var inner = (b && b.block) ? b.block : b;

        // Try every known location the text might live
        if (inner.text)                       text = inner.text;
        else if (inner.body)                  text = inner.body;
        else if (b.text)                      text = b.text;
        else if (b.body)                      text = b.body;
        else if (b.payload && b.payload.text) text = b.payload.text;
        else if (msg.text)                    text = msg.text;
        else if (typeof b === 'string')       text = b;

        console.log('[VideoTrack] Extracted text:', text);
        readMarker(text);

        // A bot message means the conversation is underway → drop the Start
        // button and let the DOM-driven policy set the composer lock.
        if (!looksLikeUserMessage(msg)) {
          markConversationStarted();
          refreshComposerLock();
        }

        // Auto-scroll to the newest incoming message (mobile/iPad UX).
        scrollChatToBottomSoon();
      }
      window.botpress.on('message',         onMessage);
      window.botpress.on('webchat:message', onMessage);
      // Belt-and-suspenders: any user send starts the conversation and locks
      // the composer until the bot replies.
      window.botpress.on('messageSent',         function () { markConversationStarted(); beginPostSendLock(); });
      window.botpress.on('webchat:messageSent', function () { markConversationStarted(); beginPostSendLock(); });
    });

    // ── Debug mode: show status bar when ?debug in URL ───────
    if (new URLSearchParams(window.location.search).has('debug')) {
      document.getElementById('vt-status-bar').style.display = 'flex';
      // Manual triggers for testing the pain-scale widget without the bot:
      //   __vtPainScale.show(0,10)  /  __vtPainScale.hide()
      window.__vtPainScale = { show: showPainScale, hide: hidePainScale };
      // Test the landscape video overlay: __vtVideoLandscape.open(videoEl) / .close()
      window.__vtVideoLandscape = { open: openVideoLandscape, close: closeVideoLandscape, isIOS: IS_IOS };
      // Test choice widgets:
      //   __vtChoice.show('singlechoice',['A','B','C'])
      //   __vtChoice.show('multiplechoice',['上午','下午','晚上'])
      window.__vtChoice = { show: showChoice, hide: hidePainScale };
      // Test the composer lock: __vtComposer.unlock() / __vtComposer.lock()
      window.__vtComposer = { lock: function(){ setComposerEnabled(false); },
                              unlock: function(){ setComposerEnabled(true); } };
      // Test the session menu: __vtMenu.show('current=3;finished=2')
      window.__vtMenu = { show: function(spec){ showSessionMenu(parseSessionMenu(spec), spec.replace(/\s+/g,'')); },
                          hide: hidePainScale };
      // Diagnostic: why is the composer locked right now?
      window.__vtWhy = function(){ return {
        convStarted:_convStarted, postSendLock:_postSendLock, idle:botIsIdle(),
        painScale:!!_painScaleEl, allowsTyping:latestBotStepAllowsTyping(),
        enabled:_composerEnabled, sinceLastMsg:(Date.now()-_lastMsgChangeAt), sig:_msgSig
      }; };
    }

    setStatus('', 'Script loaded — waiting for page...');

  })();
  </script>
