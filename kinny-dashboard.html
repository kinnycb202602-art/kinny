<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinny Knee-Pain Study Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#f1f4f8; --line:#e3e8ef;
    --txt:#1d2733; --muted:#6b7685; --accent:#3b6fe0; --accent2:#1aa37a;
    --good:#1aa37a; --danger:#e0445b;
    --c-expert:#7c5cff; --c-test:#d8902a; --c-real:#1aa37a;
    --shadow:0 1px 3px rgba(20,30,50,.06),0 1px 2px rgba(20,30,50,.04);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  header{position:sticky;top:38px;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:0 22px;box-shadow:var(--shadow)}
  .topbar{display:flex;align-items:center;gap:22px;height:60px}
  .brand{font-weight:700;font-size:16px;white-space:nowrap}
  .brand span{color:var(--accent)}
  nav{display:flex;gap:4px;flex:1}
  nav button{background:none;border:none;color:var(--muted);padding:8px 15px;font-size:14px;cursor:pointer;border-radius:8px;font-weight:500}
  nav button:hover{color:var(--txt);background:var(--panel2)}
  nav button.active{color:#fff;background:var(--accent)}
  .updated{color:var(--muted);font-size:12px;white-space:nowrap}
  .updated b{color:var(--txt);font-weight:600}
  .filterwrap{display:flex;align-items:center;gap:8px}
  .filterwrap label{color:var(--muted);font-size:12px}
  select{background:#fff;color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px}
  .wrap{max-width:1240px;margin:0 auto;padding:22px 22px 70px}
  h2.page{margin:2px 0 2px;font-size:20px}
  .sub{color:var(--muted);margin:0 0 18px;font-size:13px}
  .pagewrap{display:grid;grid-template-columns:210px 1fr;gap:22px;align-items:start}
  .sidenav{position:sticky;top:112px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;box-shadow:var(--shadow)}
  .sidenav .t{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:8px 10px 4px;font-weight:700}
  .sidenav a{display:block;padding:9px 11px;border-radius:8px;color:var(--txt);text-decoration:none;font-size:13px;cursor:pointer}
  .sidenav a:hover{background:var(--panel2)}
  .sidenav a.active{background:rgba(59,111,224,.1);color:var(--accent);font-weight:600}
  .pagebody{min-width:0}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
  .card .k{color:var(--muted);font-size:12px;margin-bottom:6px;display:flex;align-items:center}
  .card .v{font-size:26px;font-weight:700}
  .card .v small{font-size:13px;color:var(--muted);font-weight:500}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:18px;box-shadow:var(--shadow);scroll-margin-top:108px}
  .panel h3{margin:0 0 12px;font-size:14px;font-weight:600;display:flex;align-items:center}
  .panel h3 small{color:var(--muted);font-weight:400;margin-left:6px}
  canvas{max-width:100%}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px;background:var(--panel)}
  th .th{display:inline-flex;align-items:center}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  th.num .th{justify-content:flex-end}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
  .badge-done{background:rgba(26,163,122,.14);color:var(--good)}
  .badge-inc{background:rgba(107,118,133,.14);color:var(--muted)}
  .cohort-tag{font-size:10px;padding:1px 7px;border-radius:999px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .cohortbar{position:sticky;top:0;z-index:31;display:flex;gap:14px;align-items:center;justify-content:center;
    background:linear-gradient(#fff3c4,#ffe9a3);border-bottom:1px solid #e9d27e;padding:5px 16px;box-shadow:0 3px 8px rgba(190,160,30,.16)}
  .cohortbar .cb-label{font-weight:800;color:#7a5d00;text-transform:uppercase;letter-spacing:.6px;font-size:12px}
  .cohortbar select{border:2px solid #e0b400;background:#fff;font-weight:700;font-size:14px;padding:5px 14px;color:#5d4a00;border-radius:9px}
  .cohortbar .cb-hint{color:#8a6d10;font-size:12px}
  .pill-ret{background:#fde3bd;color:#9a6800}
  .pill-calc{background:rgba(26,163,122,.16);color:var(--good)}
  .pill-hist{background:rgba(107,118,133,.16);color:var(--muted)}
  .qa-link{margin-left:4px;font-size:12px;font-weight:700;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 10px;cursor:pointer;text-decoration:none;white-space:nowrap}
  .qa-link:hover{color:var(--accent);border-color:var(--accent);background:rgba(59,111,224,.06)}
  .ilog-section{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin:2px 0 7px}
  .chip.calc{border-color:var(--good);background:rgba(26,163,122,.08)}
  .drawer-overlay{position:fixed;inset:0;background:rgba(20,30,50,.35);opacity:0;visibility:hidden;transition:opacity .2s;z-index:40}
  .drawer-overlay.open{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:40vw;min-width:400px;max-width:94vw;background:var(--bg);border-left:1px solid var(--line);box-shadow:-10px 0 28px rgba(20,30,50,.15);transform:translateX(102%);transition:transform .22s ease;z-index:41;overflow:auto;padding:16px}
  .drawer.open{transform:none}
  .drawer .panel{overflow-x:auto}
  .drawer table{font-size:12px}
  .drawer-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .drawer-x{background:none;border:none;font-size:18px;line-height:1;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:8px}
  .drawer-x:hover{background:var(--panel2);color:var(--txt)}
  .drawer-full{margin-top:4px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;font-weight:600}
  .drawer-full:hover{background:#2f5fcf}
  .conv-block{margin-bottom:14px}
  .conv-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:13px;margin-bottom:8px}
  .conv-head code{background:var(--panel2);padding:1px 6px;border-radius:5px;font-size:12px}
  .conv-load{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600}
  .conv-load:hover{background:#2f5fcf}
  .conv{max-height:520px;overflow:auto;display:flex;flex-direction:column;gap:8px;padding:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px}
  .seg-sm{margin-bottom:0}
  .seg-sm button{padding:4px 10px;font-size:12px}
  .conv-count{font-size:11px;color:var(--muted);padding:2px 2px 4px;position:sticky;top:-8px;background:var(--panel2)}
  .expbtn{display:inline-flex;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:4px 11px 4px 5px;font-size:12px;font-weight:700;cursor:pointer;color:var(--txt);white-space:nowrap}
  .expbtn:hover{border-color:var(--good);background:rgba(26,163,122,.06)}
  .csvico{display:inline-flex;align-items:center;justify-content:center;background:#1aa37a;color:#fff;font-size:9px;font-weight:800;border-radius:4px;padding:3px 5px;margin-right:7px;letter-spacing:.5px}
  .pick-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .prof-pagehead{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .bubble{max-width:80%;padding:8px 11px;border-radius:12px;font-size:13px;line-height:1.45}
  .bubble.user{align-self:flex-end;background:rgba(59,111,224,.12);border:1px solid rgba(59,111,224,.25)}
  .bubble.bot{align-self:flex-start;background:#fff;border:1px solid var(--line)}
  .bubble .bmeta{font-size:10px;color:var(--muted);margin-bottom:3px}
  .bubble .btext{white-space:pre-wrap;word-break:break-word}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:16px}
  .seg button{background:#fff;border:none;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--muted);font-weight:600}
  .seg button.on{background:var(--accent);color:#fff}
  .ctlrow{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .ctlrow label{color:var(--muted);font-size:12px}
  table.matrix td,table.matrix th{white-space:nowrap}
  table.matrix tbody td{font-variant-numeric:tabular-nums}
  .qtag{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:0 5px;margin-left:4px}
  table.matrix th,table.matrix td{border-right:1px solid var(--line)}
  table.matrix th:last-child,table.matrix td:last-child{border-right:none}
  table.matrix th:first-child,table.matrix td:first-child{position:sticky;left:0;background:var(--panel);z-index:2;border-right:2px solid #cdd5e0;width:300px;min-width:300px;max-width:300px;white-space:normal}
  table.matrix thead th{vertical-align:bottom}
  .hdrsub{display:block;font-weight:400;font-size:9px;color:var(--muted);margin-top:2px;line-height:1.25}
  table.matrix tr.grp td{position:static;width:auto;min-width:0;max-width:none;background:var(--panel2);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-right:none}
  table.matrix tr.grp .grp-label{position:sticky;left:0;display:inline-block;padding-left:2px}
  .mtxwrap{overflow:auto;max-height:74vh;border:1px solid var(--line);border-radius:10px}
  table.matrix thead th{position:sticky;top:0;z-index:3;background:var(--panel)}
  table.matrix thead th:first-child{z-index:4}
  table.matrix .colsel{box-shadow:inset 2px 0 0 var(--accent),inset -2px 0 0 var(--accent)}
  table.matrix th.colsel{background:rgba(59,111,224,.14)}
  .ulink{color:var(--accent);cursor:pointer;font-weight:600;text-decoration:underline;text-underline-offset:2px}
  .ulink:hover{color:#234ea8}
  .qa-ans details summary{cursor:pointer;color:var(--txt)}
  .qa-ans details summary::-webkit-details-marker{color:var(--accent)}
  .qa-ans{max-width:420px}
  .help-yes{background:rgba(224,68,91,.14);color:var(--danger)}
  .help-no{background:rgba(107,118,133,.14);color:var(--muted)}
  .qa-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
  .qa-controls input[type=search]{flex:1;min-width:210px;padding:7px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px}
  .qa-chk{font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px}
  mark{background:#ffe9a3;color:inherit;padding:0 1px;border-radius:2px}
  /* tooltip */
  .tip{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-left:5px;width:14px;height:14px;border-radius:50%;background:var(--muted);color:#fff;font-size:10px;font-style:italic;cursor:help;font-weight:700;flex:none}
  .tip .bub{visibility:hidden;opacity:0;transition:opacity .12s;position:absolute;z-index:60;left:50%;transform:translateX(-50%);bottom:150%;background:#1d2733;color:#fff;padding:8px 10px;border-radius:8px;font-size:11px;font-weight:400;font-style:normal;line-height:1.45;width:235px;text-align:left;box-shadow:0 6px 18px rgba(0,0,0,.2)}
  .tip:hover .bub{visibility:visible;opacity:1}
  .log{max-height:520px;overflow:auto}
  .logrow{padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;border-radius:6px}
  .logrow:hover{background:rgba(59,111,224,.06)}
  .flash{animation:flashpulse 2s ease}
  @keyframes flashpulse{0%,55%{box-shadow:0 0 0 3px rgba(240,169,59,.9);background:rgba(240,169,59,.18)}100%{box-shadow:0 0 0 0 rgba(240,169,59,0);background:transparent}}
  .logrow .lt{color:var(--muted);font-size:11px}
  .logrow .ln{margin:2px 0;font-size:13px}
  .logrow .lv{color:var(--accent2);font-weight:600}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .chip{padding:5px 11px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);cursor:pointer;font-size:12px}
  .chip.sel{border-color:var(--accent);background:rgba(59,111,224,.12);color:var(--accent)}
  .muted{color:var(--muted)}
  .empty{color:var(--muted);padding:50px;text-align:center;background:var(--panel);border:1px dashed var(--line);border-radius:12px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .profile{display:grid;grid-template-columns:330px 1fr;gap:18px;align-items:start}
  .prof-top{display:grid;grid-template-columns:300px 1fr;gap:16px;align-items:start}
  .prof-pick{align-self:start}
  .minicards{display:flex;gap:8px;margin-bottom:6px;overflow-x:auto}
  .minicards .card{flex:1 1 0;min-width:108px}
  .minicards .card{padding:8px 11px;box-shadow:none;background:var(--panel2);border-color:transparent}
  .minicards .card .k{font-size:11px;margin-bottom:2px}
  .minicards .card .v{font-size:18px}
  .minicards .card .v small{font-size:11px}
  .sesh-h{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;font-weight:600;margin:14px 0 8px}
  .sesh-h code{background:var(--panel2);padding:2px 7px;border-radius:6px;font-size:12px;font-weight:500}
  .sesh-log{margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .sesh-log summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--txt)}
  .sesh-log summary::-webkit-details-marker{color:var(--accent)}
  .minchart{margin:10px 0 4px;border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .minchart summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--txt)}
  .minchart summary::-webkit-details-marker{color:var(--accent)}
  .minchart canvas{margin-top:10px}
  @media(max-width:920px){.prof-top{grid-template-columns:1fr}}
  /* collapsible session-summary panel */
  .sumcollapse{padding:0}
  .sumcollapse>summary{padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;list-style:none}
  .sumcollapse>summary::-webkit-details-marker{display:none}
  .sumcollapse>summary::before{content:"▸";color:var(--accent);margin-right:9px;font-size:12px}
  .sumcollapse[open]>summary::before{content:"▾"}
  .sumbody{padding:0 16px 16px}
  /* session workspace: sticky rail + detail */
  .sess-work{display:grid;grid-template-columns:212px 1fr;gap:16px;align-items:start}
  .sess-rail{position:sticky;top:112px;max-height:calc(100vh - 130px);overflow:auto;display:flex;flex-direction:column;gap:6px;padding-right:2px}
  .rail-item{border:1px solid var(--line);border-radius:9px;padding:7px 9px;cursor:pointer;background:var(--panel2)}
  .rail-item:hover{border-color:var(--accent)}
  .rail-item.sel{border-color:var(--accent);background:rgba(59,111,224,.10);box-shadow:inset 3px 0 0 var(--accent)}
  .rail-item .ri-top{display:flex;align-items:center;gap:5px;font-weight:700;font-size:13px}
  .rail-item .ri-date{color:var(--muted);font-size:11px;margin-top:2px}
  .rail-item .ri-stat{color:var(--muted);font-size:11px;margin-top:1px}
  .sess-detailhead{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .sess-nav{display:flex;gap:6px;margin-left:auto}
  .navbtn{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;font-weight:600;color:var(--txt)}
  .navbtn:hover{border-color:var(--accent);color:var(--accent)}
  .sess-cols{display:grid;grid-template-columns:6fr 4fr;gap:14px;margin-top:14px;align-items:start}
  .sess-cols .conv,.sess-cols .log{max-height:600px}
  .sess-log{min-width:0}
  @media(max-width:980px){.sess-work{grid-template-columns:1fr}.sess-rail{position:static;max-height:none;flex-direction:row;flex-wrap:wrap}.rail-item{flex:1 1 150px}.sess-cols{grid-template-columns:1fr}}
  /* visual session-log header */
  .loghead{display:flex;flex-wrap:wrap;gap:10px;align-items:stretch;background:linear-gradient(135deg,#eef3ff,#f6f0ff);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .loghead .big{display:flex;align-items:center;gap:10px;padding-right:14px;border-right:1px solid var(--line)}
  .loghead .snum{width:42px;height:42px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
  .loghead .sdate{font-weight:700}.loghead .sdate small{display:block;color:var(--muted);font-weight:500;font-size:11px}
  .stat{display:flex;flex-direction:column;justify-content:center;min-width:74px}
  .stat .sl{font-size:11px;color:var(--muted)}
  .stat .sv{font-size:17px;font-weight:700}
  @media(max-width:920px){.grid2,.profile,.pagewrap{grid-template-columns:1fr}.sidenav{position:static}}
</style>
</head>
<body>
<div class="cohortbar">
  <span class="cb-label">Cohort filter</span>
  <select id="cohortFilter">
    <option value="">— Select a cohort to begin —</option>
    <option value="test">Test User (userxxx)</option>
    <option value="expert">Expert (testxxx)</option>
    <option value="dora">For Dora only (testdoraxxx)</option>
    <option disabled>──────────────</option>
    <option value="real">Real User (No data now)</option>
    <option disabled>──────────────</option>
    <option value="all">All</option>
  </select>
  <span class="cb-hint" id="cbHint">Applies to all pages — stays active as you switch tabs</span>
</div>
<header>
  <div class="topbar">
    <div class="brand">Kinny <span>Knee-Pain</span> Study</div>
    <nav id="nav">
      <button data-tab="overall" class="active">Overall</button>
      <button data-tab="pain">Pain level</button>
      <button data-tab="confidence">Confidence level</button>
      <button data-tab="input">Input analysis</button>
      <button data-tab="questions">User questions</button>
      <button data-tab="profile">User profile</button>
    </nav>
    <div class="updated"><div>Data updated <b id="lastUpdated">—</b></div><div>Last build <b>2026-06-21 22:45 HKT</b> <span style="opacity:.7">(local)</span></div></div>
    <a class="qa-link" id="qaHelp" title="How are these numbers calculated? (opens in a new tab)">Q&amp;A</a>
  </div>
</header>
<div class="wrap" id="app"></div>
<div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>

RECORDS.forEach(r => { r.userId = (r.userId || '').replace(/\s+/g, ''); });
const COHORT_LABEL={dora:"For Dora",test:"Test User",expert:"Expert",real:"Real User",all:"All"};
const COHORT_HEX={dora:"#d6336c",expert:"#7c5cff",test:"#d8902a",real:"#1aa37a"};
const SESSIONS=[...new Set(RECORDS.map(r=>r.session))].sort((a,b)=>a-b);
const QUESTIONS=DATA.questions||[];
const ALL_SESS=[1,2,3,4,5,6,7,8];
const LAST_UPDATED=RECORDS.reduce((m,r)=>r.lastSeen>m?r.lastSeen:m,"")||"";
document.getElementById("lastUpdated").textContent=fmtUpd(LAST_UPDATED);
const GRIDC="#e3e8ef",TXTC="#6b7685";

let state={tab:"overall",cohort:"",selUser:"",selSessionKey:null,qaHelpOnly:false,qaUser:"",qaSearch:"",qaSort:"time",inputMode:"user",inputUser:"",inputQ:"",convScope:"session"};
let charts=[];
function destroyCharts(){charts.forEach(c=>c.destroy());charts=[];}
function filtered(){return state.cohort==="all"?RECORDS:RECORDS.filter(r=>r.cohort===state.cohort);}
function usersOf(recs){return [...new Set(recs.map(r=>r.userId))];}
function fmtDate(iso){return iso?iso.slice(0,10):"";}
function fmtUpd(d){return d?(d.slice(0,10)+"(HKT) "+d.slice(11,16)):"—";}
function fmtTime(iso){return iso?iso.slice(11,19):"";}
function tag(c){return `<span class="cohort-tag" style="background:${COHORT_HEX[c]}22;color:${COHORT_HEX[c]}">${COHORT_LABEL[c]}</span>`;}
function ulink(u){return `<span class="ulink" onclick="openDrawer('${encodeURIComponent(u)}')">${esc(u)}</span>`;}
function tip(t){return `<span class="tip">i<span class="bub">${t}</span></span>`;}
const EXDUR_MAP={"小於60分鐘":"&lt;60 min","60至少於 150分鐘":"60–150 min","60至少於150分鐘":"60–150 min","150分鐘或以上":"≥150 min"};
const EXTOD_MAP={"早上":"Morning (AM)","上午":"Morning (AM)","下午":"Afternoon (PM)","晚上":"Night"};
function exDurLabel(v){ return v?(EXDUR_MAP[v]||esc(v)):'<span class="muted">—</span>'; }
function exTodLabel(v){ return v?(EXTOD_MAP[v]||esc(v)):'<span class="muted">—</span>'; }

/* definitions reused in tooltips */
const T={
  users:"Distinct user IDs in the selected cohort.",
  attended:"Number of user×session records. A user counts once per session, even across return visits.",
  completed:"A session occurrence is Completed when its Operation \u2018Start\u2019 and \u2018End\u2019 are within 2 hours; otherwise partial. Each Start→End pair is one occurrence.",
  rate:"Completed sessions ÷ sessions attended.",
  avgsess:"Sessions attended ÷ users.",
  returners:"Users active on more than one calendar day (HKT).",
  plays:"Total video + audio play taps, counted from each session’s first completed attempt.",
  vplaysO:"Total ‘Click Play Video’ taps across sessions (first completed attempt of each).",
  aplaysO:"Total ‘Click Play Audio’ taps across sessions (first completed attempt of each).",
  vminO:"Total video watch time (min) across sessions — from each ‘Click Play’ until the user returns to the chat (Video Watch End, not the ‘done’ tap), summed.",
  aminO:"Total audio listen time (min) across sessions — from each ‘Click Play’ until the user returns to the chat (Audio Listen End), summed.",
  perSess:"Unique users with any activity in each session number.",
  retFreq:"Users grouped by how many distinct sessions they attended.",
  attComp:"Per session: records logged (attended) vs those with an end-of-session marker (completed).",
  pain:"Weekly knee-pain score, 0 = no pain … 10 = worst. Value = the first completed attempt of each session.",
  conf:"Self-efficacy score, 0 = no confidence … 10 = fully confident. Value = the first completed attempt of each session.",
  avgLine:"Cohort mean of the per-session scores.",
  status:"Completed = the occurrence\u2019s Operation \u2018Start\u2019 and \u2018End\u2019 are within 2h. For sessions entered more than once, the row reflects the first completed occurrence.",
  retTimes:"How many times the user entered this session (each Operation Start→End occurrence). 1 = no return; 2+ means they came back.",
  vplays:"‘Click Play Video’ taps in the first completed attempt.",
  aplays:"‘Click Play Audio’ taps in the first completed attempt.",
  vdur:"Video watch time (min): from ‘Click Play Video’ until ‘Video Watch End’ (user clicks back to the chat), summed across plays. Sessions with no play event show 0.",

};

function pageShell(title,subtitle,navItems,bodyHTML){
  return `<h2 class="page">${title}</h2><p class="sub">${subtitle}</p>
  <div class="pagewrap"><div class="sidenav"><div class="t">On this page</div>
    ${navItems.map((n,i)=>`<a data-anchor="${n.id}" class="${i===0?'active':''}">${n.label}</a>`).join("")}
  </div><div class="pagebody">${bodyHTML}</div></div>`;
}
let scrollHandler=null;
function clearScroll(){ if(scrollHandler){window.removeEventListener("scroll",scrollHandler);scrollHandler=null;} }
function wireSideNav(){
  const links=[...document.querySelectorAll(".sidenav a")];
  links.forEach(a=>a.addEventListener("click",()=>{const el=document.getElementById(a.dataset.anchor);
    if(el) el.scrollIntoView({behavior:"smooth",block:"start"});}));
  const ids=links.map(a=>a.dataset.anchor);
  clearScroll();
  scrollHandler=function(){const thr=140;let act=ids[0];
    for(const id of ids){const el=document.getElementById(id);if(!el)continue;if(el.getBoundingClientRect().top<=thr)act=id;}
    links.forEach(a=>a.classList.toggle("active",a.dataset.anchor===act));};
  window.addEventListener("scroll",scrollHandler,{passive:true});scrollHandler();
}

/* ---------- OVERALL ---------- */
function renderOverall(){
  const recs=filtered(),users=usersOf(recs);
  const completed=recs.filter(r=>r.completed).length;
  const totVPlays=recs.reduce((a,r)=>a+r.videoPlays,0), totAPlays=recs.reduce((a,r)=>a+r.audioPlays,0);
  const totVMin=recs.reduce((a,r)=>a+r.videoDurMin,0), totAMin=recs.reduce((a,r)=>a+r.audioDurMin,0);
  const perUser={};users.forEach(u=>perUser[u]=new Set());recs.forEach(r=>perUser[r.userId].add(r.session));
  const avgSess=users.length?(recs.length/users.length):0;
  const usersPerSession=SESSIONS.map(s=>new Set(recs.filter(r=>r.session===s).map(r=>r.userId)).size);
  const completedPerSession=SESSIONS.map(s=>recs.filter(r=>r.session===s&&r.completed).length);
  const distCounts={};users.forEach(u=>{const n=perUser[u].size;distCounts[n]=(distCounts[n]||0)+1;});
  const maxN=Math.max(1,...Object.keys(distCounts).map(Number));
  const distLabels=[],distData=[];
  for(let i=1;i<=maxN;i++){distLabels.push(i+" session"+(i>1?"s":""));distData.push(distCounts[i]||0);}
  const activeDays={};users.forEach(u=>activeDays[u]=new Set());recs.forEach(r=>r.dates.forEach(d=>activeDays[r.userId].add(d)));
  const returners=users.filter(u=>activeDays[u].size>1).length;

  const body=`
   <div class="panel" id="ov-summary"><h3>Summary</h3><div class="cards" style="margin-bottom:0">
     <div class="card"><div class="k">Users${tip(T.users)}</div><div class="v">${users.length}</div></div>
     <div class="card"><div class="k">Sessions attended${tip(T.attended)}</div><div class="v">${recs.length}</div></div>
     <div class="card"><div class="k">Sessions completed${tip(T.completed)}</div><div class="v">${completed} <small>/ ${recs.length}</small></div></div>
     <div class="card"><div class="k">Completion rate${tip(T.rate)}</div><div class="v">${recs.length?Math.round(completed/recs.length*100):0}<small>%</small></div></div>
     <div class="card"><div class="k">Avg sessions / user${tip(T.avgsess)}</div><div class="v">${avgSess.toFixed(1)}</div></div>
     <div class="card"><div class="k">Returning users${tip(T.returners)}</div><div class="v">${returners}</div></div>
     <div class="card"><div class="k">Video min${tip(T.vminO)}</div><div class="v">${totVMin.toFixed(0)}</div></div>
     <div class="card"><div class="k">Audio min${tip(T.aminO)}</div><div class="v">${totAMin.toFixed(0)}</div></div>
   </div></div>
   <div class="panel" id="ov-session"><h3>Users per session ${tip(T.perSess)}</h3><canvas id="cSession" height="150"></canvas></div>
   <div class="panel" id="ov-return"><h3>Return frequency ${tip(T.retFreq)}</h3><canvas id="cReturn" height="150"></canvas></div>
   <div class="panel" id="ov-comp"><h3>Attended vs completed ${tip(T.attComp)}</h3><canvas id="cComp" height="130"></canvas></div>
   <div class="panel" id="ov-table"><h3>User Attendance Summary</h3>
     <table><thead><tr><th>User</th><th>Cohort</th>
       <th class="num"><span class="th">Attended${tip(T.attended)}</span></th>
       <th class="num"><span class="th">Completed${tip(T.completed)}</span></th>
       <th class="num"><span class="th">Return sessions${tip(T.retSess)}</span></th>
       <th class="num"><span class="th">Active days${tip(T.returners)}</span></th><th>Date range</th></tr></thead>
     <tbody>${users.map(u=>{const ur=recs.filter(r=>r.userId===u);const comp=ur.filter(r=>r.completed).length;
       const ad=[...new Set(ur.flatMap(r=>r.dates))].sort();const c=ur[0].cohort;
       const retSess=ur.filter(r=>r.returnTimes>1).length;
       return `<tr><td>${ulink(u)}</td><td>${tag(c)}</td><td class="num">${perUser[u].size}</td><td class="num">${comp}</td><td class="num">${retSess}</td><td class="num">${ad.length}</td>
       <td class="muted">${ad[0]||""}${ad.length>1?" → "+ad[ad.length-1]:""}</td></tr>`;}).join("")}</tbody></table></div>`;
  const nav=[{id:"ov-summary",label:"Summary"},{id:"ov-session",label:"Users per session"},
    {id:"ov-return",label:"Return frequency"},{id:"ov-comp",label:"Attended vs completed"},{id:"ov-table",label:"User Attendance Summary"}];
  document.getElementById("app").innerHTML=pageShell("Overall engagement",
    `${COHORT_LABEL[state.cohort]} &middot; ${users.length} user(s) &middot; ${recs.length} user-session(s)`,nav,body);
  wireSideNav();destroyCharts();
  charts.push(new Chart(document.getElementById("cSession"),{type:"bar",data:{labels:SESSIONS.map(s=>"S"+s),datasets:[{label:"Unique users",data:usersPerSession,backgroundColor:"#3b6fe0"}]},options:barOpts()}));
  charts.push(new Chart(document.getElementById("cReturn"),{type:"bar",data:{labels:distLabels,datasets:[{label:"Users",data:distData,backgroundColor:"#1aa37a"}]},options:barOpts()}));
  charts.push(new Chart(document.getElementById("cComp"),{type:"bar",data:{labels:SESSIONS.map(s=>"Session "+s),datasets:[
    {label:"Attended",data:SESSIONS.map(s=>recs.filter(r=>r.session===s).length),backgroundColor:"#c4cdda"},
    {label:"Completed",data:completedPerSession,backgroundColor:"#1aa37a"}]},options:barOpts(true)}));
}

/* ---------- METRIC (pain / confidence) ---------- */
function renderMetric(cfg){
  const recs=filtered(),users=usersOf(recs),key=cfg.key,improveDown=cfg.improveDown;
  const userSeries=users.map(u=>{
    const data=SESSIONS.map(s=>{const r=recs.find(x=>x.userId===u&&x.session===s);return r&&r[key]!=null?r[key]:null;});
    return {u,data,cohort:recs.find(r=>r.userId===u).cohort};
  }).filter(se=>se.data.some(v=>v!=null));
  const avg=SESSIONS.map(s=>{const v=recs.filter(r=>r.session===s&&r[key]!=null).map(r=>r[key]);
    return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):null;});
  const vals=recs.filter(r=>r[key]!=null).map(r=>r[key]);
  const overall=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  const deltas=userSeries.map(se=>{const p=se.data.filter(v=>v!=null);return {u:se.u,cohort:se.cohort,delta:p.length>1?+(p[p.length-1]-p[0]).toFixed(2):null};}).filter(d=>d.delta!=null);
  const improvedN=deltas.filter(d=>improveDown?d.delta<0:d.delta>0).length;
  const worseN=deltas.filter(d=>improveDown?d.delta>0:d.delta<0).length;
  const sameN=deltas.filter(d=>d.delta===0).length;
  const avgDelta=deltas.length?(deltas.reduce((a,d)=>a+d.delta,0)/deltas.length):0;
  const deltasSorted=deltas.slice().sort((a,b)=>improveDown?(a.delta-b.delta):(b.delta-a.delta));
  const dtip=`Difference between the user’s earliest and latest session with a reading. ${improveDown?"▼ green = decreased (improved).":"▲ green = increased (improved)."}`;

  const body=`
   <div class="panel" id="m-summary"><h3>Summary ${tip(cfg.def)}</h3><div class="cards" style="margin-bottom:0">
     <div class="card"><div class="k">${cfg.noun} readings${tip("Number of sessions with a recorded score in this cohort.")}</div><div class="v">${vals.length}</div></div>
     <div class="card"><div class="k">Avg ${cfg.noun.toLowerCase()}${tip(T.avgLine)}</div><div class="v">${overall.toFixed(1)}</div></div>
     <div class="card"><div class="k">Min / Max</div><div class="v">${vals.length?Math.min(...vals):"-"} <small>/ ${vals.length?Math.max(...vals):"-"}</small></div></div>
     <div class="card"><div class="k">Users with data</div><div class="v">${userSeries.length}</div></div>
   </div></div>
   <div class="panel" id="m-change"><h3>Change trend <small>first → latest reading per user</small>${tip("Each user’s change from their first to latest session with a "+cfg.noun.toLowerCase()+" reading. "+(improveDown?"Bars left/green = decreased (improved).":"Bars right/green = increased (improved)."))}</h3>
     <div class="cards" style="margin-bottom:12px">
       <div class="card"><div class="k">Improved</div><div class="v" style="color:var(--good)">${improvedN}</div></div>
       <div class="card"><div class="k">Worsened</div><div class="v" style="color:var(--danger)">${worseN}</div></div>
       <div class="card"><div class="k">No change</div><div class="v">${sameN}</div></div>
       <div class="card"><div class="k">Avg change</div><div class="v">${avgDelta>0?"+":""}${avgDelta.toFixed(1)}</div></div>
     </div>
     ${deltas.length?`<canvas id="cChange" height="${Math.max(90,deltasSorted.length*24)}"></canvas>`:'<div class="empty">Not enough repeat readings to show a change.</div>'}</div>
   <div class="panel" id="m-chart"><h3>${cfg.noun} per session ${tip(cfg.def)}</h3>
     <canvas id="cMetric" height="110"></canvas><div class="legend" id="mLegend"></div></div>
   <div class="panel" id="m-avg"><h3>Cohort average per session ${tip(T.avgLine)}</h3><canvas id="cMetricAvg" height="100"></canvas></div>
   <div class="panel" id="m-table"><h3>${cfg.noun} table <small>by user × session</small></h3>
     <table><thead><tr><th>User</th><th>Cohort</th>${SESSIONS.map(s=>`<th class="num">S${s}</th>`).join("")}
       <th class="num"><span class="th">Δ first→last${tip(dtip)}</span></th></tr></thead>
     <tbody>${userSeries.map(se=>{const present=se.data.filter(v=>v!=null);
       const delta=present.length>1?(present[present.length-1]-present[0]):null;
       let dStr="<span class='muted'>—</span>";
       if(delta!=null){const improved=improveDown?delta<0:delta>0;const worse=improveDown?delta>0:delta<0;
         dStr=delta===0?"0":`<span style="color:${improved?'var(--good)':worse?'var(--danger)':'var(--muted)'}">${delta<0?'▼':'▲'} ${Math.abs(delta)}</span>`;}
       return `<tr><td>${ulink(se.u)}</td><td>${tag(se.cohort)}</td>${se.data.map(v=>`<td class="num">${v==null?"<span class='muted'>·</span>":v}</td>`).join("")}<td class="num">${dStr}</td></tr>`;
     }).join("")}<tr style="font-weight:700"><td>Average</td><td></td>${avg.map(v=>`<td class="num">${v==null?"·":v}</td>`).join("")}<td></td></tr></tbody></table></div>`;
  const nav=[{id:"m-summary",label:"Summary"},{id:"m-change",label:"Change trend"},{id:"m-chart",label:cfg.noun+" per session"},
    {id:"m-avg",label:"Cohort average"},{id:"m-table",label:cfg.noun+" table"}];
  document.getElementById("app").innerHTML=pageShell(cfg.title,`${COHORT_LABEL[state.cohort]} &middot; ${cfg.scale}`,nav,body);
  wireSideNav();destroyCharts();
  const pal=["#3b6fe0","#1aa37a","#d8902a","#e0445b","#7c5cff","#0fb5c9","#7cb342","#ef6c3b","#5c6bc0","#d81b8c","#8d6e63","#78909c","#c0ca33","#ab47bc"];
  const ds=userSeries.map((se,i)=>({label:se.u,data:se.data,borderColor:pal[i%pal.length],backgroundColor:pal[i%pal.length],spanGaps:true,tension:.25,pointRadius:3,borderWidth:1.5}));
  ds.push({label:"AVG",data:avg,borderColor:"#1d2733",backgroundColor:"#1d2733",borderWidth:3,borderDash:[6,4],spanGaps:true,tension:.25,pointRadius:0});
  charts.push(new Chart(document.getElementById("cMetric"),{type:"line",data:{labels:SESSIONS.map(s=>"Session "+s),datasets:ds},options:lineOpts(0,10)}));
  document.getElementById("mLegend").innerHTML=userSeries.map((se,i)=>`<span><i style="background:${pal[i%pal.length]}"></i>${se.u}</span>`).join("")+`<span><i style="background:#1d2733"></i>Average</span>`;
  charts.push(new Chart(document.getElementById("cMetricAvg"),{type:"line",data:{labels:SESSIONS.map(s=>"Session "+s),datasets:[{label:"Avg",data:avg,borderColor:cfg.color,backgroundColor:cfg.color+"33",fill:true,spanGaps:true,tension:.25}]},options:lineOpts(0,10)}));
  if(document.getElementById("cChange")){
    const cols=deltasSorted.map(d=>{const imp=improveDown?d.delta<0:d.delta>0,wor=improveDown?d.delta>0:d.delta<0;return imp?"#1aa37a":wor?"#e0445b":"#9aa3b2";});
    charts.push(new Chart(document.getElementById("cChange"),{type:"bar",
      data:{labels:deltasSorted.map(d=>d.u),datasets:[{label:"Δ first→last",data:deltasSorted.map(d=>d.delta),backgroundColor:cols}]},
      options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>"Δ "+(c.raw>0?"+":"")+c.raw}}},
        scales:{x:{grid:{color:GRIDC},ticks:{color:TXTC},title:{display:true,text:"Δ (first → latest)",color:TXTC}},y:{grid:{display:false},ticks:{color:TXTC}}}}}));
  }
}

/* ---------- PROFILE ---------- */
// shared builder: aggregate panel + per-session metrics panel for one user (used by profile page + drawer)
function userAggAndMetrics(u, recsAll, trendId, withExport){
  const ur=recsAll.filter(r=>r.userId===u).sort((a,b)=>a.session-b.session);
  if(!ur.length) return {aggPanel:'<div class="empty">No data for this user.</div>',metricsPanel:'',ur:[]};
  const bySess={};ur.forEach(r=>bySess[r.session]=r);
  const comp=ur.filter(r=>r.completed).length;
  const pains=ur.filter(r=>r.pain!=null);
  const avgPain=pains.length?(pains.reduce((a,r)=>a+r.pain,0)/pains.length):null;
  const fp=pains.length?pains[0].pain:null,lp=pains.length?pains[pains.length-1].pain:null;
  const dp=(fp!=null&&lp!=null&&pains.length>1)?lp-fp:null;
  const confs=ur.filter(r=>r.confidence!=null);
  const avgConf=confs.length?(confs.reduce((a,r)=>a+r.confidence,0)/confs.length):null;
  const totVPlays=ur.reduce((a,r)=>a+r.videoPlays,0),totAPlays=ur.reduce((a,r)=>a+r.audioPlays,0);
  const totVMin=ur.reduce((a,r)=>a+r.videoDurMin,0),totAMin=ur.reduce((a,r)=>a+r.audioDurMin,0);
  const ad=[...new Set(ur.flatMap(r=>r.dates))].sort();
  const rowHTML=ALL_SESS.map(s=>{const r=bySess[s];
    if(!r) return `<tr><td>S${s}</td><td class="muted">—</td><td class="num muted">—</td><td class="num muted">—</td><td class="muted">—</td><td class="muted">—</td><td class="num muted">—</td></tr>`;
    const st=r.completed?'<span class="pill badge-done">Complete</span>':'<span class="pill badge-inc">Partial</span>';
    return `<tr><td>S${s}</td><td>${st}</td><td class="num">${r.returnTimes}</td>
      <td class="num">${r.pain==null?'<span class="muted">—</span>':r.pain}</td>
      <td>${exDurLabel(r.exDur)}</td><td>${exTodLabel(r.exTod)}</td>
      <td class="num">${r.confidence==null?'<span class="muted">—</span>':r.confidence}</td></tr>`;}).join("");
  const aggPanel=`<div class="panel"><h3>${esc(u)} ${tag(ur[0].cohort)}${withExport?`<button class="expbtn" style="margin-left:auto" title="Export all of ${esc(u)} — raw input" onclick="exportUser('${encodeURIComponent(u)}')"><span class="csvico">CSV</span>All ${esc(u)} raw input</button>`:''}</h3>
      <div class="minicards">
        <div class="card"><div class="k">Sessions attended${tip(T.attended)}</div><div class="v">${ur.length}</div></div>
        <div class="card"><div class="k">Completed${tip(T.completed)}</div><div class="v">${comp}</div></div>
        <div class="card"><div class="k">Avg pain${tip(T.pain)}</div><div class="v">${avgPain==null?"—":avgPain.toFixed(1)}</div></div>
        <div class="card"><div class="k">Pain change${tip("First vs last session pain. ▼ green = improved.")}</div><div class="v">${dp==null?"—":(dp<0?`<span style='color:var(--good)'>▼${Math.abs(dp)}</span>`:dp>0?`<span style='color:var(--danger)'>▲${dp}</span>`:"0")}</div></div>
        <div class="card"><div class="k">Avg confidence${tip(T.conf)}</div><div class="v">${avgConf==null?"—":avgConf.toFixed(1)}</div></div>
        <div class="card"><div class="k">Video min${tip(T.vdur)}</div><div class="v">${totVMin.toFixed(0)}<small>m</small></div></div>
        <div class="card"><div class="k">Audio min${tip(T.adur)}</div><div class="v">${totAMin.toFixed(0)}<small>m</small></div></div>
      </div>
      <p class="sub" style="margin:6px 0 0">Active ${ad.length} day(s): ${ad[0]||""}${ad.length>1?" → "+ad[ad.length-1]:""}</p></div>`;
  const metricsPanel=`<div class="panel" id="p-metrics"><h3>Session metrics (S1–S8) ${tip("One row per session. For re-entered sessions, values come from the first completed occurrence.")}</h3>
      <canvas id="${trendId}" height="90"></canvas>

function enhanceLogTimes(){
  const all=(convCache&&convCache.messages)||[];
  document.querySelectorAll(".sess-log .logrow").forEach(row=>{
    const lt=row.querySelector(".lt"); if(!lt) return;
    const aTime=row.dataset.t;
    const q=convNorm(row.dataset.q||"");
    let qm=null;
    // the question is a Kinny (bot) message asked no later than the answer was logged;
    // pick the nearest such match so a repeated prompt in a later occurrence can't be chosen
    if(q.length>=6 && all.length) all.forEach(m=>{
      if(m.from!=="bot" || m.t>aTime) return;
      const tx=convNorm(m.text);
      const hit = tx.includes(q) || (tx.length>=6 && q.includes(tx));
      if(hit && (!qm || m.t>qm.t)) qm=m;

window.convJump=function(rowEl){
  flashEl(rowEl);

  const bubbles=[...cont.querySelectorAll(".bubble[data-t]")];
  if(!bubbles.length) return;
  const q=rowEl.dataset.q||"", t=rowEl.dataset.t||"";
  // 1) match by the QUESTION text (the bot bubble that asked it)
  const key=convNorm(q);
  let best=null, score=0;
  if(key.length>=6){
    bubbles.forEach(b=>{ const tx=convNorm((b.querySelector(".btext")||{}).textContent);
      let sc=0;
      if(tx.includes(key)) sc=key.length;
      else if(tx.length>=6 && key.includes(tx)) sc=tx.length;
      if(sc>score){ score=sc; best=b; }

  if(!best && t){ const target=new Date(t).getTime(); let bd=Infinity;

};

  "<div class=q>When is an occurrence 'Complete'?</div><div class=a>When its Start and End are within <b>2 hours</b>. Otherwise it is 'Partial'. (Short form on chips: <code>comp</code> / <code>partial</code>.)</div>"+
  "<div class=q>Which occurrence feeds the numbers?</div><div class=a>The <b>first completed</b> occurrence of each session (or the first occurrence if none completed). On the User input log it is the top 'used' row; returning / earlier occurrences are listed below but do not feed the per-session figures.</div>"+
  "<h2>Pain level &amp; Confidence level</h2>"+
  "<div class=q>What do the scores mean?</div><div class=a>Pain: 0 = no pain … 10 = worst. Confidence (self-efficacy): 0 = none … 10 = fully confident. Each session's value is taken from its first completed occurrence.</div>"+
  "<div class=q>What is the Change trend chart?</div><div class=a>Each user's change from their first to their latest session with a reading. Green = improvement (pain going down, or confidence going up); red = worsening.</div>"+
  "<h2>Exercise fields (User profile table)</h2>"+
  "<div class=a><b>Ex duration (last wk)</b> = the self-reported time spent exercising in the previous week. <b>Ex practice (am/pm/night)</b> = when the user planned to exercise that week.</div>"+
  "<h2>Video &amp; audio</h2>"+
  "<div class=q>How are plays and minutes measured?</div><div class=a>Plays = count of <code>Click Play Video / Audio</code> taps. Duration = real watch/listen time: each play is paired with the next <code>End Time</code> (when the user returned to the chat, not the 'done' tap) and the spans are summed. Sessions with no play event show 0.</div>"+
  "<div class=q>Video event definitions (raw bot events)</div><div class=a>"+
  "<b>Video Watch Start Time (HK)</b> — the video is shown to the user, but not auto-played.<br>"+
  "<b>Click Play Video (HK)</b> — the user clicked play.<br>"+
  "<b>Click Pause Video (HK)</b> — the user clicked pause.<br>"+
  "<b>Video Watch End Time (HK) （點我完成了）</b> — the user clicked 我完成了 (I'm done).<br>"+
  "<b>Video Watch Duration (Min)</b> = Video Watch End Time （點我完成了） − Video Watch Start Time.<br>"+
  "<small>Note: the dashboard's <b>Video min</b> is computed differently — from <code>Click Play</code> to the next non-（點我完成了） end, summed — so it reflects active play time rather than the bot's start-to-done span.</small></div>"+
  "<h2>User questions</h2>"+
  "<div class=q>What is the 'Needs help' flag?</div><div class=a>Set when the user answered <b>No</b> to the follow-up <code>請問你的疑問是否得到解答?</code> (‘Did that answer your question?’) — i.e. the AI reply did not resolve their question. A cue for human follow-up.</div>"+
  "<h2>Header: Data updated vs Last build</h2>"+
  "<div class=a><b>Data updated</b> = the most recent record time in the data. <b>Last build</b> = when this dashboard version was generated, with its commit reference. The live dashboard re-pulls from Botpress on load (cached ~5 min).</div>"+
  "<div class=note>Older imported sessions share one bulk-import timestamp, so their video/audio durations and Start&rarr;End gaps can read as 0 or be split only by event order. The newer live data (with real per-event times) is precise.</div>"+
  "</body></html>";
  const w=window.open("","_blank");
  if(w){ w.document.open(); w.document.write(H); w.document.close(); }
}

const QA_SORTS={time:"Time (oldest → newest)",user:"User (A → Z)",session:"Session (low → high)",help:"Need-help first"};
function qaBase(){ return state.cohort==="all"?QUESTIONS:QUESTIONS.filter(q=>q.cohort===state.cohort); }
function qaShown(){
  let qs=qaBase();
  if(state.qaUser) qs=qs.filter(q=>q.userId===state.qaUser);
  if(state.qaHelpOnly) qs=qs.filter(q=>q.needHelp);
  const kw=(state.qaSearch||"").trim().toLowerCase();
  if(kw) qs=qs.filter(q=>(q.question||"").toLowerCase().includes(kw)||(q.answer||"").toLowerCase().includes(kw));
  qs=qs.slice();
  const s=state.qaSort, byT=(a,b)=>a.t<b.t?-1:a.t>b.t?1:a.idx-b.idx;
  if(s==="user") qs.sort((a,b)=>{const x=a.userId.toLowerCase(),y=b.userId.toLowerCase();return x<y?-1:x>y?1:byT(a,b);});
  else if(s==="session") qs.sort((a,b)=>a.session-b.session||byT(a,b));
  else if(s==="help") qs.sort((a,b)=>(b.needHelp-a.needHelp)||byT(a,b));
  else qs.sort(byT);
  return qs;
}
function hl(text){
  const t=esc(text||""); const kw=(state.qaSearch||"").trim();
  if(!kw) return t;
  try{ return t.replace(new RegExp("("+kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"),"<mark>$1</mark>"); }catch(e){ return t; }
}
function qaRows(shown){

    const ques=q.question?hl(q.question):'<span class="muted">(blank)</span>';

      <td class="muted" style="white-space:nowrap">${q.t.slice(0,10)}<br>${q.t.slice(11,16)}</td>
      <td>${ulink(q.userId)}</td>

}

/* ---------- INPUT ANALYSIS (question × session pivot) ---------- */
const QMAP=[
  ["此次對話只用於研究用途","Consent (OK)"],
  ["你最近1周膝關節有疼痛","Pain (0–10)"],
  ["請問你有幾分自信","Confidence (0–10)"],
  ["上週你大約花了多少時間做","Exercise time last wk"],
  ["在上一週的運動練習中，大約花了多少","Exercise time last wk"],
  ["什麼時段運動","Planned exercise time"],
  ["什麼時間安排運動","Planned exercise time"],
  ["得到解答","Question answered?"],
  ["你覺得運動對緩解膝關節疼痛有幫助","Exercise helps pain?"],
  ["平時你有運動習慣","Exercise habit?"],
  ["還有任何問題","Any questions?"],
  ["請描述你的問題","Question (Q&A)"],
  ["準備好的話，請點擊OK","Ready (OK)"],
  ["重温節數數字","Revision session #"],
  ["你以前有接觸過靜觀","Tried mindfulness?"],
  ["運動完之後","Post-exercise feeling"],
];
const CANON_LABEL={"@feel_breath":"Feeling — mindful breathing"};
function canon(name){
  // merge differently-worded but same-purpose questions into one canonical row
  if(name.includes("靜觀呼吸") && (name.includes("感受")||name.includes("分享"))) return "@feel_breath";
  for(const kv of QMAP){ if(name.includes(kv[0])) return "@"+kv[1]; }   // all curated/recurring questions
  return name;
}
function canonResp(r){ const o=r.responses||{}; const m={}; for(const k in o){ m[canon(k)]=o[k]; } return m; }
function qlabel(key){ if(CANON_LABEL[key]) return CANON_LABEL[key]; if(key.charAt(0)==="@") return key.slice(1); return key.length>26?key.slice(0,24)+"…":key; }
function isMapped(key){ return key.charAt(0)==="@"; }
function isTextQ(key){
  if(key==="@feel_breath" || key==="@Post-exercise feeling" || key==="@Question (Q&A)") return true;
  return key.charAt(0)!=="@" && (key.includes("感受")||key.includes("分享")||key.includes("請描述你的問題"));
}
function qtype(key,vals){ if(isTextQ(key)) return "text"; const nn=vals.filter(v=>/^\d+(\.\d+)?$/.test(v)); if(nn.length && nn.length>=vals.length*0.6) return "num"; return (new Set(vals)).size<=8?"cat":"text"; }
function clip(v){ return v.length>16?v.slice(0,15)+"…":v; }
function escAttr(s){ return esc(s).replace(/"/g,"&quot;"); }
function heatNum(v){ const n=Number(v); return (isFinite(n)?`style="background:rgba(59,111,224,${Math.max(0,Math.min(1,n/10))*0.20})"`:""); }
function buildCatalog(recs){
  const cnt={}, vbk={};
  recs.forEach(r=>{ const o=canonResp(r); for(const k in o){ cnt[k]=(cnt[k]||0)+1; (vbk[k]=vbk[k]||[]).push(o[k]); } });
  return Object.keys(cnt).map(k=>({key:k,label:qlabel(k),count:cnt[k],type:qtype(k,vbk[k])})).sort((a,b)=>b.count-a.count);
}
// question × session matrix for one user. sel = selected session number; clickable headers call profPickSession.
function userMatrix(u, recs, sel, clickable){
  const catalog=buildCatalog(recs);
  const byUS={}; recs.forEach(r=>byUS[r.userId+"|"+r.session]=canonResp(r));
  const recBy={}; recs.filter(r=>r.userId===u).forEach(r=>recBy[r.session]=r);
  const qSess={}; RECORDS.forEach(r=>{const o=canonResp(r);for(const k in o){(qSess[k]=qSess[k]||new Set()).add(r.session);}});
  const oSum={},oCnt={}; RECORDS.forEach(r=>{Object.keys(canonResp(r)).forEach((k,i)=>{oSum[k]=(oSum[k]||0)+i;oCnt[k]=(oCnt[k]||0)+1;});});
  const orderOf=k=>oCnt[k]?oSum[k]/oCnt[k]:999;
  const canonSrc={}; RECORDS.forEach(r=>{const o=r.responses||{};for(const k in o){const c=canon(k);if(c!==k){(canonSrc[c]=canonSrc[c]||new Set()).add(k);}}});
  const ans=catalog.filter(c=>ALL_SESS.some(s=>(byUS[u+"|"+s]||{})[c.key]!=null));
  const cncols=1+ALL_SESS.length;
  const rowFor=c=>{
    const cells=ALL_SESS.map(s=>{const v=(byUS[u+"|"+s]||{})[c.key];
      const selc=(sel===s)?" colsel":"";
      if(v==null) return `<td class="muted${selc}">·</td>`;
      return `<td class="${selc.trim()}" title="${escAttr(v)}" ${c.type==="num"?heatNum(v):""}>${esc(clip(v))}</td>`;}).join("");
    let lbl=esc(c.label);
    if(canonSrc[c.key] && canonSrc[c.key].size>=2) lbl+=tip("Combines these differently-worded questions with the same purpose, asked across sessions: "+[...canonSrc[c.key]].map(x=>x.length>40?x.slice(0,40)+"…":x).join(" ／ "));
    return `<tr><td title="${escAttr(c.key.charAt(0)==="@"?c.label:c.key)}">${lbl} <span class="qtag">${c.type}</span></td>${cells}</tr>`;};
  const common=ans.filter(c=>isMapped(c.key)).sort((a,b)=>orderOf(a.key)-orderOf(b.key));
  const specific={};
  ans.filter(c=>!isMapped(c.key)).forEach(c=>{const ss=[...(qSess[c.key]||[])]; const home=ss.length?Math.min(...ss):0; (specific[home]=specific[home]||[]).push(c);});
  Object.keys(specific).forEach(k=>specific[k].sort((a,b)=>orderOf(a.key)-orderOf(b.key)));
  let bodyRows="";
  if(common.length) bodyRows+=`<tr class="grp"><td colspan="${cncols}"><span class="grp-label">Common questions</span></td></tr>`+common.map(rowFor).join("");
  ALL_SESS.forEach(sn=>{ if(specific[sn]&&specific[sn].length) bodyRows+=`<tr class="grp"><td colspan="${cncols}"><span class="grp-label">Session ${sn} questions</span></td></tr>`+specific[sn].map(rowFor).join(""); });
  const fmt=x=>x==null?"—":(+x).toFixed(1);
  const headCells=ALL_SESS.map(s=>{const r=recBy[s];
    const click=clickable?` onclick="profPickSession(${s})" style="cursor:pointer"`:"";
    const selc=(clickable&&sel===s)?" colsel":"";
    let sub='<span class="hdrsub">—</span>';
    if(r) sub=`<span class="hdrsub">${esc(r.repDate.slice(5))}<br>${r.completed?'<span style="color:var(--good)">comp</span>':'partial'}<br>sess ${fmt(r.sessionMin)}m<br>vid ${fmt(r.videoDurMin)}·aud ${fmt(r.audioDurMin)}m</span>`;
    return `<th class="num${selc}"${click}>S${s}${sub}</th>`;}).join("");
  return `<div class="mtxwrap"><table class="matrix"><thead><tr><th>Question</th>${headCells}</tr></thead><tbody>${bodyRows||'<tr><td class="muted" colspan="'+cncols+'">No answers for this user.</td></tr>'}</tbody></table></div>`;
}
function renderInput(){
  const recs=filtered(), users=usersOf(recs), catalog=buildCatalog(recs);
  const qcat=catalog.filter(c=>isMapped(c.key) && (c.type==="num"||c.type==="cat"));  // by-question: common num/cat only
  const byUS={}; recs.forEach(r=>byUS[r.userId+"|"+r.session]=canonResp(r));
  // asking-sequence order (avg position within a session's answered-questions list)
  const oSum={}, oCnt={};
  RECORDS.forEach(r=>{ Object.keys(canonResp(r)).forEach((k,i)=>{ oSum[k]=(oSum[k]||0)+i; oCnt[k]=(oCnt[k]||0)+1; }); });
  const orderOf=k=> oCnt[k]?oSum[k]/oCnt[k]:999;
  // which raw questions were merged into each canon key (for tooltip)
  const canonSrc={}; RECORDS.forEach(r=>{ const o=r.responses||{}; for(const k in o){ const c=canon(k); if(c!==k){ (canonSrc[c]=canonSrc[c]||new Set()).add(k); } } });
  if(state.inputMode!=="user" && state.inputMode!=="question") state.inputMode="user";

  const modeBtns=`<div class="seg"><button class="${state.inputMode==='user'?'on':''}" data-m="user">By user (profile)</button><button class="${state.inputMode==='question'?'on':''}" data-m="question">By common questions</button></div>`;

        ${userMatrix(u, recs, null, false)}</div>`;

      ${q?`<div class="panel"><h3>${esc(q.label)} — trend across sessions ${tip("Common (recurring) questions only, numeric or categorical. Full question: "+q.key)}</h3>${chartHTML}</div>

  }
  document.getElementById("app").innerHTML=`<h2 class="page">Input analysis</h2>
    <p class="sub">${COHORT_LABEL[state.cohort]} &middot; user inputs, session-by-session &times; question-by-question</p>${modeBtns}${body}`;
  document.querySelectorAll(".seg button").forEach(b=>b.addEventListener("click",()=>{state.inputMode=b.dataset.m;render();}));
  const iu=document.getElementById("inUser"); if(iu) iu.addEventListener("change",e=>{state.inputUser=e.target.value;render();});
  const iq=document.getElementById("inQ"); if(iq) iq.addEventListener("change",e=>{state.inputQ=e.target.value;render();});
  destroyCharts();
  if(state.inputMode==="question"){
    const q=qcat.find(c=>c.key===state.inputQ)||qcat[0];
    if(q&&q.type==="num"){
      const avg=ALL_SESS.map(s=>{const v=users.map(u=>(byUS[u+"|"+s]||{})[q.key]).filter(x=>x!=null&&/^\d/.test(x)).map(Number);return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(2):null;});
      const el=document.getElementById("cInputAvg"); if(el) charts.push(new Chart(el,{type:"line",data:{labels:ALL_SESS.map(s=>"S"+s),datasets:[{label:"Cohort average",data:avg,borderColor:"#3b6fe0",backgroundColor:"#3b6fe033",fill:true,spanGaps:true,tension:.25,pointRadius:3}]},options:lineOpts(0,10)}));
    } else if(q&&q.type==="cat"){
      const allv=[]; users.forEach(u=>ALL_SESS.forEach(s=>{const v=(byUS[u+"|"+s]||{})[q.key]; if(v!=null) allv.push(v);}));
      const distinct=[...new Set(allv)].slice(0,8);
      const pal=["#3b6fe0","#1aa37a","#d8902a","#e0445b","#7c5cff","#0fb5c9","#7cb342","#9aa3b2"];
      const ds=distinct.map((dv,i)=>({label:clip(dv),data:ALL_SESS.map(s=>{let c=0;users.forEach(u=>{if((byUS[u+"|"+s]||{})[q.key]===dv)c++;});return c;}),backgroundColor:pal[i%pal.length]}));
      const el=document.getElementById("cInputDist"); if(el) charts.push(new Chart(el,{type:"bar",data:{labels:ALL_SESS.map(s=>"S"+s),datasets:ds},options:{responsive:true,plugins:{legend:{display:true,labels:{color:TXTC,font:{size:10}}}},scales:{x:{stacked:true,grid:{color:GRIDC},ticks:{color:TXTC}},y:{stacked:true,beginAtZero:true,grid:{color:GRIDC},ticks:{color:TXTC,precision:0}}}}}));
    }
  }
}

function render(){
  clearScroll();
  if(!state.cohort){
    document.getElementById("app").innerHTML=`<div class="empty" style="margin-top:34px;font-size:15px">Choose a cohort in the yellow bar above to load the dashboard.<br><span style="font-size:13px">Everything stays filtered to that cohort as you switch tabs.</span></div>`;
    return;
  }
  if(state.tab==="overall")renderOverall();
  else if(state.tab==="pain")renderMetric(PAIN_CFG);
  else if(state.tab==="confidence")renderMetric(CONF_CFG);
  else if(state.tab==="input")renderInput();
  else if(state.tab==="questions")renderQuestions();
  else renderProfile();
}
document.getElementById("nav").addEventListener("click",e=>{
  if(e.target.tagName!=="BUTTON")return;
  document.querySelectorAll("#nav button").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");state.tab=e.target.dataset.tab;render();
});
(function(){const b=document.getElementById("qaHelp"); if(b) b.addEventListener("click",openQA);})();
document.getElementById("cohortFilter").addEventListener("change",e=>{
  state.cohort=e.target.value;state.selUser="";state.selSessionKey=null;state.qaUser="";state.qaSearch="";state.qaHelpOnly=false;state.qaSort="time";state.inputUser="";state.inputQ="";render();
});
render();
</script>
</body>
</html>
